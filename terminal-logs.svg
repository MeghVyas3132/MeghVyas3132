  <text x="30" y="150" class="log-text log-debug">[2026-06-07 11:25:16] DEBUG  | Circuit breaker: CLOSED</text>
  <text x="30" y="170" class="log-text log-info">[2026-06-07 11:25:18] INFO   | Database query optimized (61ms→11ms)</text>
  <text x="30" y="190" class="log-text log-info">[2026-06-07 11:25:20] INFO   | Container started: user-service-6c8d5</text>
  <text x="30" y="210" class="log-text log-info">[2026-06-07 11:25:22] INFO   | Deploy rollout: 34/47 pods updated</text>
  <text x="30" y="230" class="log-text log-info">[2026-06-07 11:25:24] INFO   | Backup completed: 546 MB</text>
  <text x="30" y="250" class="log-text log-info">[2026-06-07 11:25:26] INFO   | Pod notification-svc-2f8a2 started</text>
  <text x="30" y="270" class="log-text log-info">[2026-06-07 11:25:28] INFO   | Pod auth-service-9e3a8 started</text>
  <text x="30" y="290" class="log-text log-info">[2026-06-07 11:25:30] INFO   | Deploy rollout: 35/47 pods updated</text>
  <text x="30" y="310" class="log-text log-info">[2026-06-07 11:25:32] INFO   | Load balancer: distributing traffic</text>
  <text x="30" y="330" class="log-text log-info">[2026-06-07 11:25:34] INFO   | Container started: notification-svc-9b4b3</text>
