  <text x="30" y="130" class="log-text log-info">[2025-12-31 15:43:55] INFO   | Load balancer: distributing traffic</text>
  <text x="30" y="150" class="log-text log-debug">[2025-12-31 15:43:57] DEBUG  | Cache hit: user:8b9b2</text>
  <text x="30" y="170" class="log-text log-info">[2025-12-31 15:43:59] INFO   | Container started: user-service-8c9e3</text>
  <text x="30" y="190" class="log-text log-debug">[2025-12-31 15:44:01] DEBUG  | Circuit breaker: CLOSED</text>
  <text x="30" y="210" class="log-text log-info">[2025-12-31 15:44:03] INFO   | Auto-scaling triggered: +3 pods</text>
  <text x="30" y="230" class="log-text log-info">[2025-12-31 15:44:05] INFO   | Load balancer: distributing traffic</text>
  <text x="30" y="250" class="log-text log-info">[2025-12-31 15:44:07] INFO   | Health check passed: payment-service</text>
