<svg width="1200" height="400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .terminal-bg { fill: #0a0a0a; }
      .terminal-border { fill: none; stroke: #404040; stroke-width: 2; }
      .terminal-title { font: bold 16px 'Courier New', monospace; fill: #ffffff; }
      .log-text { font: 12px 'Courier New', monospace; }
      .log-info { fill: #fdba74; }
      .log-warn { fill: #fcd34d; }
      .log-debug { fill: #a8a29e; }
      .cursor { fill: #fdba74; }
      @keyframes blink {
        0%, 50% { opacity: 1; }
        51%, 100% { opacity: 0; }
      }
      .blinking { animation: blink 1s infinite; }
    </style>
  </defs>
  
  <rect width="1200" height="400" class="terminal-bg"/>
  <rect x="5" y="5" width="1190" height="390" class="terminal-border" rx="8"/>
  
  <!-- Terminal Header -->
  <rect x="15" y="15" width="1170" height="35" fill="#1a1a1a" rx="5"/>
  <text x="30" y="38" class="terminal-title">LIVE SYSTEM LOGS [LAST 60 SECONDS]</text>
  
  <!-- Log Lines -->
  <text x="30" y="70" class="log-text log-info">[2026-06-10 08:37:31] INFO   | Container started: user-service-2c8b2</text>
  <text x="30" y="90" class="log-text log-info">[2026-06-10 08:37:33] INFO   | Load balancer: distributing traffic</text>
  <text x="30" y="110" class="log-text log-info">[2026-06-10 08:37:35] INFO   | Request processed: 200 OK (48ms)</text>
  <text x="30" y="130" class="log-text log-info">[2026-06-10 08:37:37] INFO   | Pod notification-svc-6b4a1 started</text>
  <text x="30" y="150" class="log-text log-info">[2026-06-10 08:37:39] INFO   | Database query optimized (58ms→21ms)</text>
  <text x="30" y="170" class="log-text log-info">[2026-06-10 08:37:41] INFO   | Deploy rollout: 31/47 pods updated</text>
  <text x="30" y="190" class="log-text log-info">[2026-06-10 08:37:43] INFO   | Auto-scaling triggered: +3 pods</text>
  <text x="30" y="210" class="log-text log-info">[2026-06-10 08:37:45] INFO   | SSL cert renewed: *.meghvyas.dev</text>
  <text x="30" y="230" class="log-text log-info">[2026-06-10 08:37:47] INFO   | Metric exported: cpu_usage=71%</text>
  <text x="30" y="250" class="log-text log-info">[2026-06-10 08:37:49] INFO   | Deploy rollout: 36/47 pods updated</text>
  <text x="30" y="270" class="log-text log-debug">[2026-06-10 08:37:51] DEBUG  | Cache hit: user:2c8e9</text>
  <text x="30" y="290" class="log-text log-warn">[2026-06-10 08:37:53] WARN   | High latency detected: payment-service</text>
