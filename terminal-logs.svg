  <text x="30" y="150" class="log-text log-info">[2026-01-05 15:56:21] INFO   | Pod payment-service-9c1e2 started</text>
  <text x="30" y="170" class="log-text log-info">[2026-01-05 15:56:23] INFO   | Deploy rollout: 37/47 pods updated</text>
  <text x="30" y="190" class="log-text log-info">[2026-01-05 15:56:25] INFO   | Metric exported: cpu_usage=82%</text>
  <text x="30" y="210" class="log-text log-info">[2026-01-05 15:56:27] INFO   | SSL cert renewed: *.meghvyas.dev</text>
  <text x="30" y="230" class="log-text log-info">[2026-01-05 15:56:29] INFO   | Pod auth-service-8d6a5 started</text>
  <text x="30" y="250" class="log-text log-info">[2026-01-05 15:56:31] INFO   | Health check passed: user-service</text>
  <text x="30" y="270" class="log-text log-warn">[2026-01-05 15:56:33] WARN   | High latency detected: user-service</text>
  <text x="30" y="290" class="log-text log-info">[2026-01-05 15:56:35] INFO   | SSL cert renewed: *.meghvyas.dev</text>
  <text x="30" y="310" class="log-text log-info">[2026-01-05 15:56:37] INFO   | Auto-scaling triggered: +1 pods</text>
  <text x="30" y="330" class="log-text log-warn">[2026-01-05 15:56:39] WARN   | High latency detected: auth-service</text>
  <text x="30" y="350" class="log-text log-info">[2026-01-05 15:56:41] INFO   | Deploy rollout: 20/47 pods updated</text>
  
  <!-- Cursor -->
  <rect x="30" y="370" width="10" height="15" class="cursor blinking"/>
