  <text x="30" y="150" class="log-text log-debug">[2026-04-04 05:45:22] DEBUG  | Cache hit: user:1a6b1</text>
  <text x="30" y="170" class="log-text log-info">[2026-04-04 05:45:24] INFO   | Database query optimized (89ms→12ms)</text>
  <text x="30" y="190" class="log-text log-debug">[2026-04-04 05:45:26] DEBUG  | Circuit breaker: CLOSED</text>
  <text x="30" y="210" class="log-text log-info">[2026-04-04 05:45:28] INFO   | Database query optimized (94ms→11ms)</text>
  <text x="30" y="230" class="log-text log-info">[2026-04-04 05:45:30] INFO   | Request processed: 200 OK (24ms)</text>
  <text x="30" y="250" class="log-text log-info">[2026-04-04 05:45:32] INFO   | Backup completed: 774 MB</text>
