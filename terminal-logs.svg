<svg width="1200" height="400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .terminal-bg { fill: #0a0a0a; }
      .terminal-border { fill: none; stroke: #404040; stroke-width: 2; }
      .terminal-title { font: bold 16px 'Courier New', monospace; fill: #ffffff; }
      .log-text { font: 12px 'Courier New', monospace; }
      .log-info { fill: #fdba74; }
      .log-warn { fill: #fcd34d; }
      .log-debug { fill: #a8a29e; }
      .cursor { fill: #fdba74; }
      @keyframes blink {
        0%, 50% { opacity: 1; }
        51%, 100% { opacity: 0; }
      }
      .blinking { animation: blink 1s infinite; }
    </style>
  </defs>
  
  <rect width="1200" height="400" class="terminal-bg"/>
  <rect x="5" y="5" width="1190" height="390" class="terminal-border" rx="8"/>
  
  <!-- Terminal Header -->
  <rect x="15" y="15" width="1170" height="35" fill="#1a1a1a" rx="5"/>
  <text x="30" y="38" class="terminal-title">LIVE SYSTEM LOGS [LAST 60 SECONDS]</text>
  
  <!-- Log Lines -->
  <text x="30" y="70" class="log-text log-info">[2026-03-03 11:21:37] INFO   | Metric exported: cpu_usage=91%</text>
  <text x="30" y="90" class="log-text log-info">[2026-03-03 11:21:39] INFO   | Deploy rollout: 34/47 pods updated</text>
  <text x="30" y="110" class="log-text log-info">[2026-03-03 11:21:41] INFO   | Load balancer: distributing traffic</text>
  <text x="30" y="130" class="log-text log-info">[2026-03-03 11:21:43] INFO   | Health check passed: user-service</text>
  <text x="30" y="150" class="log-text log-warn">[2026-03-03 11:21:45] WARN   | High latency detected: payment-service</text>
  <text x="30" y="170" class="log-text log-info">[2026-03-03 11:21:47] INFO   | Pod notification-svc-9a4a4 started</text>
  <text x="30" y="190" class="log-text log-info">[2026-03-03 11:21:49] INFO   | Request processed: 200 OK (42ms)</text>
  <text x="30" y="210" class="log-text log-info">[2026-03-03 11:21:51] INFO   | Health check passed: notification-svc</text>
  <text x="30" y="230" class="log-text log-info">[2026-03-03 11:21:53] INFO   | Backup completed: 778 MB</text>
  <text x="30" y="250" class="log-text log-debug">[2026-03-03 11:21:55] DEBUG  | Circuit breaker: CLOSED</text>
  <text x="30" y="270" class="log-text log-debug">[2026-03-03 11:21:57] DEBUG  | Rate limit check: 6102 req/s</text>
  <text x="30" y="290" class="log-text log-debug">[2026-03-03 11:21:59] DEBUG  | Cache hit: user:5a3d7</text>
  <text x="30" y="310" class="log-text log-info">[2026-03-03 11:22:01] INFO   | Pod user-service-6a8a7 started</text>
  <text x="30" y="330" class="log-text log-info">[2026-03-03 11:22:03] INFO   | Database query optimized (76ms→14ms)</text>
  <text x="30" y="350" class="log-text log-info">[2026-03-03 11:22:05] INFO   | Deploy rollout: 34/47 pods updated</text>
  
  <!-- Cursor -->
  <rect x="30" y="370" width="10" height="15" class="cursor blinking"/>
  <text x="45" y="382" class="log-text log-info">[Streaming...]</text>
</svg>