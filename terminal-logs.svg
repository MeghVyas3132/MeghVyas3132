  <text x="30" y="230" class="log-text log-info">[2026-05-04 22:15:48] INFO   | Health check passed: auth-service</text>
  <text x="30" y="250" class="log-text log-debug">[2026-05-04 22:15:50] DEBUG  | Rate limit check: 6687 req/s</text>
