  <text x="30" y="310" class="log-text log-info">[2026-04-04 02:54:37] INFO   | Deploy rollout: 20/47 pods updated</text>
  <text x="30" y="330" class="log-text log-info">[2026-04-04 02:54:39] INFO   | Container started: auth-service-4e1e1</text>
  <text x="30" y="350" class="log-text log-info">[2026-04-04 02:54:41] INFO   | Container started: api-gateway-6d1c7</text>
  
  <!-- Cursor -->
  <rect x="30" y="370" width="10" height="15" class="cursor blinking"/>
