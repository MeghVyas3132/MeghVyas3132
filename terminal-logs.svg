<svg width="1200" height="400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .terminal-bg { fill: #0d1117; }
      .terminal-border { fill: none; stroke: #30363d; stroke-width: 2; }
      .terminal-title { font: bold 16px 'Courier New', monospace; fill: #58a6ff; }
      .log-text { font: 12px 'Courier New', monospace; }
      .log-info { fill: #3fb950; }
      .log-warn { fill: #d29922; }
      .log-debug { fill: #8b949e; }
      .cursor { fill: #58a6ff; }
      @keyframes blink {
        0%, 50% { opacity: 1; }
        51%, 100% { opacity: 0; }
      }
      .blinking { animation: blink 1s infinite; }
    </style>
  </defs>
  
  <rect width="1200" height="400" class="terminal-bg"/>
  <rect x="5" y="5" width="1190" height="390" class="terminal-border" rx="8"/>
  
  <!-- Terminal Header -->
  <rect x="15" y="15" width="1170" height="35" fill="#161b22" rx="5"/>
  <text x="30" y="38" class="terminal-title">📟 LIVE SYSTEM LOGS [LAST 60 SECONDS]</text>
  
  <!-- Log Lines -->
  <text x="30" y="70" class="log-text log-info">[2025-12-31 02:21:14] INFO   | Load balancer: distributing traffic</text>
  <text x="30" y="90" class="log-text log-info">[2025-12-31 02:21:16] INFO   | Database query optimized (82ms→11ms)</text>
  <text x="30" y="110" class="log-text log-debug">[2025-12-31 02:21:18] DEBUG  | Rate limit check: 8172 req/s</text>
  <text x="30" y="130" class="log-text log-info">[2025-12-31 02:21:20] INFO   | Container started: notification-svc-1e7d2</text>
  <text x="30" y="150" class="log-text log-info">[2025-12-31 02:21:22] INFO   | Auto-scaling triggered: +1 pods</text>
  <text x="30" y="170" class="log-text log-debug">[2025-12-31 02:21:24] DEBUG  | Cache hit: user:4e8c5</text>
  <text x="30" y="190" class="log-text log-debug">[2025-12-31 02:21:26] DEBUG  | Cache hit: user:2f1a8</text>
  <text x="30" y="210" class="log-text log-info">[2025-12-31 02:21:28] INFO   | Health check passed: user-service</text>
  <text x="30" y="230" class="log-text log-warn">[2025-12-31 02:21:30] WARN   | High latency detected: payment-service</text>
  <text x="30" y="250" class="log-text log-info">[2025-12-31 02:21:32] INFO   | Auto-scaling triggered: +1 pods</text>
  <text x="30" y="270" class="log-text log-info">[2025-12-31 02:21:34] INFO   | Metric exported: cpu_usage=88%</text>
  <text x="30" y="290" class="log-text log-info">[2025-12-31 02:21:36] INFO   | Database query optimized (44ms→18ms)</text>
  <text x="30" y="310" class="log-text log-info">[2025-12-31 02:21:38] INFO   | Metric exported: cpu_usage=90%</text>
  <text x="30" y="330" class="log-text log-debug">[2025-12-31 02:21:40] DEBUG  | Cache hit: user:7e6e4</text>
  <text x="30" y="350" class="log-text log-debug">[2025-12-31 02:21:42] DEBUG  | Rate limit check: 8730 req/s</text>
  
  <!-- Cursor -->
  <rect x="30" y="370" width="10" height="15" class="cursor blinking"/>
  <text x="45" y="382" class="log-text log-info">[Streaming...]</text>
</svg>