  <text x="30" y="110" class="log-text log-info">[2025-12-31 20:28:05] INFO   | Pod payment-service-2f7c8 started</text>
  <text x="30" y="130" class="log-text log-debug">[2025-12-31 20:28:07] DEBUG  | Cache hit: user:5a2c3</text>
  <text x="30" y="150" class="log-text log-info">[2025-12-31 20:28:09] INFO   | Metric exported: cpu_usage=87%</text>
  <text x="30" y="170" class="log-text log-info">[2025-12-31 20:28:11] INFO   | Request processed: 200 OK (37ms)</text>
  <text x="30" y="190" class="log-text log-debug">[2025-12-31 20:28:13] DEBUG  | Cache hit: user:9a5c7</text>
  <text x="30" y="210" class="log-text log-info">[2025-12-31 20:28:15] INFO   | Container started: auth-service-6c5e9</text>
  <text x="30" y="230" class="log-text log-debug">[2025-12-31 20:28:17] DEBUG  | Rate limit check: 7518 req/s</text>
  <text x="30" y="250" class="log-text log-debug">[2025-12-31 20:28:19] DEBUG  | Circuit breaker: CLOSED</text>
  <text x="30" y="270" class="log-text log-warn">[2025-12-31 20:28:21] WARN   | High latency detected: auth-service</text>
  <text x="30" y="290" class="log-text log-info">[2025-12-31 20:28:23] INFO   | Container started: notification-svc-6d4a2</text>
