  <text x="30" y="130" class="log-text log-info">[2026-01-02 04:31:06] INFO   | Health check passed: payment-service</text>
  <text x="30" y="150" class="log-text log-info">[2026-01-02 04:31:08] INFO   | Deploy rollout: 28/47 pods updated</text>
  <text x="30" y="170" class="log-text log-info">[2026-01-02 04:31:10] INFO   | Container started: payment-service-3d1e1</text>
  <text x="30" y="190" class="log-text log-info">[2026-01-02 04:31:12] INFO   | Database query optimized (59ms→13ms)</text>
  <text x="30" y="210" class="log-text log-debug">[2026-01-02 04:31:14] DEBUG  | Rate limit check: 8743 req/s</text>
  <text x="30" y="230" class="log-text log-info">[2026-01-02 04:31:16] INFO   | Pod api-gateway-9d7a1 started</text>
  <text x="30" y="250" class="log-text log-info">[2026-01-02 04:31:18] INFO   | Auto-scaling triggered: +2 pods</text>
