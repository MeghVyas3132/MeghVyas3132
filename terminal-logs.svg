  <text x="30" y="170" class="log-text log-info">[2026-03-19 20:26:29] INFO   | Pod notification-svc-8f5a3 started</text>
  <text x="30" y="190" class="log-text log-info">[2026-03-19 20:26:31] INFO   | SSL cert renewed: *.meghvyas.dev</text>
  <text x="30" y="210" class="log-text log-info">[2026-03-19 20:26:33] INFO   | Metric exported: cpu_usage=87%</text>
