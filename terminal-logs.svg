  <text x="30" y="170" class="log-text log-debug">[2026-04-12 15:49:08] DEBUG  | Rate limit check: 9779 req/s</text>
  <text x="30" y="190" class="log-text log-info">[2026-04-12 15:49:10] INFO   | Deploy rollout: 25/47 pods updated</text>
