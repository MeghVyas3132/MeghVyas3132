<svg width="1200" height="400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .terminal-bg { fill: #0d1117; }
      .terminal-border { fill: none; stroke: #30363d; stroke-width: 2; }
      .terminal-title { font: bold 16px 'Courier New', monospace; fill: #58a6ff; }
      .log-text { font: 12px 'Courier New', monospace; }
      .log-info { fill: #3fb950; }
      .log-warn { fill: #d29922; }
      .log-debug { fill: #8b949e; }
      .cursor { fill: #58a6ff; }
      @keyframes blink {
        0%, 50% { opacity: 1; }
        51%, 100% { opacity: 0; }
      }
      .blinking { animation: blink 1s infinite; }
    </style>
  </defs>
  
  <rect width="1200" height="400" class="terminal-bg"/>
  <rect x="5" y="5" width="1190" height="390" class="terminal-border" rx="8"/>
  
  <!-- Terminal Header -->
  <rect x="15" y="15" width="1170" height="35" fill="#161b22" rx="5"/>
  <text x="30" y="38" class="terminal-title">📟 LIVE SYSTEM LOGS [LAST 60 SECONDS]</text>
  
  <!-- Log Lines -->
  <text x="30" y="70" class="log-text log-info">[2025-12-31 15:54:29] INFO   | Backup completed: 513 MB</text>
  <text x="30" y="90" class="log-text log-debug">[2025-12-31 15:54:31] DEBUG  | Circuit breaker: CLOSED</text>
  <text x="30" y="110" class="log-text log-info">[2025-12-31 15:54:33] INFO   | Container started: payment-service-7d1d7</text>
  <text x="30" y="130" class="log-text log-info">[2025-12-31 15:54:35] INFO   | Request processed: 200 OK (50ms)</text>
  <text x="30" y="150" class="log-text log-info">[2025-12-31 15:54:37] INFO   | Load balancer: distributing traffic</text>
  <text x="30" y="170" class="log-text log-warn">[2025-12-31 15:54:39] WARN   | High latency detected: auth-service</text>
  <text x="30" y="190" class="log-text log-info">[2025-12-31 15:54:41] INFO   | SSL cert renewed: *.meghvyas.dev</text>
  <text x="30" y="210" class="log-text log-info">[2025-12-31 15:54:43] INFO   | Pod user-service-7f4a1 started</text>
  <text x="30" y="230" class="log-text log-warn">[2025-12-31 15:54:45] WARN   | High latency detected: payment-service</text>
  <text x="30" y="250" class="log-text log-debug">[2025-12-31 15:54:47] DEBUG  | Circuit breaker: CLOSED</text>
  <text x="30" y="270" class="log-text log-debug">[2025-12-31 15:54:49] DEBUG  | Rate limit check: 7081 req/s</text>
  <text x="30" y="290" class="log-text log-debug">[2025-12-31 15:54:51] DEBUG  | Rate limit check: 7261 req/s</text>
  <text x="30" y="310" class="log-text log-info">[2025-12-31 15:54:53] INFO   | Container started: notification-svc-7a4d8</text>
  <text x="30" y="330" class="log-text log-info">[2025-12-31 15:54:55] INFO   | Container started: user-service-1b2a9</text>
  <text x="30" y="350" class="log-text log-info">[2025-12-31 15:54:57] INFO   | Health check passed: notification-svc</text>
  
  <!-- Cursor -->
  <rect x="30" y="370" width="10" height="15" class="cursor blinking"/>
  <text x="45" y="382" class="log-text log-info">[Streaming...]</text>
</svg>