  <text x="30" y="150" class="log-text log-debug">[2026-01-01 05:48:44] DEBUG  | Rate limit check: 9523 req/s</text>
  <text x="30" y="170" class="log-text log-info">[2026-01-01 05:48:46] INFO   | Request processed: 200 OK (23ms)</text>
  <text x="30" y="190" class="log-text log-info">[2026-01-01 05:48:48] INFO   | Deploy rollout: 26/47 pods updated</text>
