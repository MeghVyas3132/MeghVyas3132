<svg width="1200" height="400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .terminal-bg { fill: #0a0a0a; }
      .terminal-border { fill: none; stroke: #404040; stroke-width: 2; }
      .terminal-title { font: bold 16px 'Courier New', monospace; fill: #ffffff; }
      .log-text { font: 12px 'Courier New', monospace; }
      .log-info { fill: #fdba74; }
      .log-warn { fill: #fcd34d; }
      .log-debug { fill: #a8a29e; }
      .cursor { fill: #fdba74; }
      @keyframes blink {
        0%, 50% { opacity: 1; }
        51%, 100% { opacity: 0; }
      }
      .blinking { animation: blink 1s infinite; }
    </style>
  </defs>
  
  <rect width="1200" height="400" class="terminal-bg"/>
  <rect x="5" y="5" width="1190" height="390" class="terminal-border" rx="8"/>
  
  <!-- Terminal Header -->
  <rect x="15" y="15" width="1170" height="35" fill="#1a1a1a" rx="5"/>
  <text x="30" y="38" class="terminal-title">LIVE SYSTEM LOGS [LAST 60 SECONDS]</text>
  
  <!-- Log Lines -->
  <text x="30" y="70" class="log-text log-info">[2026-01-10 10:20:05] INFO   | Database query optimized (69ms→17ms)</text>
  <text x="30" y="90" class="log-text log-debug">[2026-01-10 10:20:07] DEBUG  | Cache hit: user:3f7e4</text>
  <text x="30" y="110" class="log-text log-info">[2026-01-10 10:20:09] INFO   | Pod notification-svc-4a1b5 started</text>
  <text x="30" y="130" class="log-text log-info">[2026-01-10 10:20:11] INFO   | Backup completed: 751 MB</text>
  <text x="30" y="150" class="log-text log-info">[2026-01-10 10:20:13] INFO   | Backup completed: 761 MB</text>
  <text x="30" y="170" class="log-text log-info">[2026-01-10 10:20:15] INFO   | Pod api-gateway-2f9d1 started</text>
  <text x="30" y="190" class="log-text log-debug">[2026-01-10 10:20:17] DEBUG  | Rate limit check: 8764 req/s</text>
  <text x="30" y="210" class="log-text log-info">[2026-01-10 10:20:19] INFO   | Database query optimized (75ms→18ms)</text>
  <text x="30" y="230" class="log-text log-info">[2026-01-10 10:20:21] INFO   | SSL cert renewed: *.meghvyas.dev</text>
  <text x="30" y="250" class="log-text log-warn">[2026-01-10 10:20:23] WARN   | High latency detected: api-gateway</text>
  <text x="30" y="270" class="log-text log-info">[2026-01-10 10:20:25] INFO   | Container started: payment-service-6f8c8</text>
  <text x="30" y="290" class="log-text log-info">[2026-01-10 10:20:27] INFO   | Pod payment-service-4e4d9 started</text>
  <text x="30" y="310" class="log-text log-info">[2026-01-10 10:20:29] INFO   | Auto-scaling triggered: +2 pods</text>
  <text x="30" y="330" class="log-text log-info">[2026-01-10 10:20:31] INFO   | Load balancer: distributing traffic</text>
  <text x="30" y="350" class="log-text log-info">[2026-01-10 10:20:33] INFO   | Metric exported: cpu_usage=92%</text>
  
  <!-- Cursor -->
  <rect x="30" y="370" width="10" height="15" class="cursor blinking"/>
  <text x="45" y="382" class="log-text log-info">[Streaming...]</text>
</svg>