  <text x="30" y="170" class="log-text log-info">[2026-01-05 07:55:29] INFO   | Auto-scaling triggered: +1 pods</text>
  <text x="30" y="190" class="log-text log-warn">[2026-01-05 07:55:31] WARN   | High latency detected: api-gateway</text>
  <text x="30" y="210" class="log-text log-info">[2026-01-05 07:55:33] INFO   | Pod notification-svc-5e8a3 started</text>
  <text x="30" y="230" class="log-text log-info">[2026-01-05 07:55:35] INFO   | Pod notification-svc-8e3b7 started</text>
  <text x="30" y="250" class="log-text log-warn">[2026-01-05 07:55:37] WARN   | High latency detected: notification-svc</text>
  <text x="30" y="270" class="log-text log-info">[2026-01-05 07:55:39] INFO   | Deploy rollout: 36/47 pods updated</text>
  <text x="30" y="290" class="log-text log-info">[2026-01-05 07:55:41] INFO   | Health check passed: api-gateway</text>
