  <text x="30" y="150" class="log-text log-info">[2026-04-12 08:02:14] INFO   | Pod auth-service-5d7e7 started</text>
  <text x="30" y="170" class="log-text log-info">[2026-04-12 08:02:16] INFO   | Metric exported: cpu_usage=75%</text>
  <text x="30" y="190" class="log-text log-info">[2026-04-12 08:02:18] INFO   | Metric exported: cpu_usage=78%</text>
  <text x="30" y="210" class="log-text log-info">[2026-04-12 08:02:20] INFO   | Request processed: 200 OK (11ms)</text>
  <text x="30" y="230" class="log-text log-debug">[2026-04-12 08:02:22] DEBUG  | Circuit breaker: CLOSED</text>
