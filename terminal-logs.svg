  <text x="30" y="130" class="log-text log-info">[2026-03-31 17:13:26] INFO   | Backup completed: 659 MB</text>
  <text x="30" y="150" class="log-text log-debug">[2026-03-31 17:13:28] DEBUG  | Rate limit check: 5592 req/s</text>
  <text x="30" y="170" class="log-text log-info">[2026-03-31 17:13:30] INFO   | Deploy rollout: 31/47 pods updated</text>
  <text x="30" y="190" class="log-text log-info">[2026-03-31 17:13:32] INFO   | Deploy rollout: 23/47 pods updated</text>
  <text x="30" y="210" class="log-text log-debug">[2026-03-31 17:13:34] DEBUG  | Rate limit check: 8373 req/s</text>
  <text x="30" y="230" class="log-text log-info">[2026-03-31 17:13:36] INFO   | Request processed: 200 OK (49ms)</text>
  <text x="30" y="250" class="log-text log-info">[2026-03-31 17:13:38] INFO   | Pod user-service-3a7a9 started</text>
