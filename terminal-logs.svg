  <text x="30" y="150" class="log-text log-info">[2026-01-01 14:28:19] INFO   | Request processed: 200 OK (15ms)</text>
  <text x="30" y="170" class="log-text log-debug">[2026-01-01 14:28:21] DEBUG  | Circuit breaker: CLOSED</text>
  <text x="30" y="190" class="log-text log-info">[2026-01-01 14:28:23] INFO   | Container started: user-service-2b3c2</text>
