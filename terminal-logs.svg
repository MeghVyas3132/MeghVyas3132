<svg width="1200" height="400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .terminal-bg { fill: #0a0a0a; }
      .terminal-border { fill: none; stroke: #404040; stroke-width: 2; }
      .terminal-title { font: bold 16px 'Courier New', monospace; fill: #ffffff; }
      .log-text { font: 12px 'Courier New', monospace; }
      .log-info { fill: #fdba74; }
      .log-warn { fill: #fcd34d; }
      .log-debug { fill: #a8a29e; }
      .cursor { fill: #fdba74; }
      @keyframes blink {
        0%, 50% { opacity: 1; }
        51%, 100% { opacity: 0; }
      }
      .blinking { animation: blink 1s infinite; }
    </style>
  </defs>
  
  <rect width="1200" height="400" class="terminal-bg"/>
  <rect x="5" y="5" width="1190" height="390" class="terminal-border" rx="8"/>
  
  <!-- Terminal Header -->
  <rect x="15" y="15" width="1170" height="35" fill="#1a1a1a" rx="5"/>
  <text x="30" y="38" class="terminal-title">LIVE SYSTEM LOGS [LAST 60 SECONDS]</text>
  
  <!-- Log Lines -->
  <text x="30" y="70" class="log-text log-info">[2026-05-05 08:24:34] INFO   | Pod payment-service-4d3f1 started</text>
  <text x="30" y="90" class="log-text log-debug">[2026-05-05 08:24:36] DEBUG  | Circuit breaker: CLOSED</text>
  <text x="30" y="110" class="log-text log-info">[2026-05-05 08:24:38] INFO   | Backup completed: 972 MB</text>
  <text x="30" y="130" class="log-text log-debug">[2026-05-05 08:24:40] DEBUG  | Cache hit: user:4c7a6</text>
  <text x="30" y="150" class="log-text log-info">[2026-05-05 08:24:42] INFO   | Container started: user-service-1f1c8</text>
  <text x="30" y="170" class="log-text log-info">[2026-05-05 08:24:44] INFO   | Health check passed: payment-service</text>
  <text x="30" y="190" class="log-text log-debug">[2026-05-05 08:24:46] DEBUG  | Rate limit check: 9243 req/s</text>
  <text x="30" y="210" class="log-text log-info">[2026-05-05 08:24:48] INFO   | Request processed: 200 OK (20ms)</text>
  <text x="30" y="230" class="log-text log-debug">[2026-05-05 08:24:50] DEBUG  | Cache hit: user:2d4b7</text>
  <text x="30" y="250" class="log-text log-info">[2026-05-05 08:24:52] INFO   | Pod auth-service-4d8f5 started</text>
  <text x="30" y="270" class="log-text log-info">[2026-05-05 08:24:54] INFO   | Database query optimized (82ms→25ms)</text>
  <text x="30" y="290" class="log-text log-info">[2026-05-05 08:24:56] INFO   | Metric exported: cpu_usage=71%</text>
  <text x="30" y="310" class="log-text log-info">[2026-05-05 08:24:58] INFO   | Metric exported: cpu_usage=94%</text>
  <text x="30" y="330" class="log-text log-warn">[2026-05-05 08:25:00] WARN   | High latency detected: notification-svc</text>
  <text x="30" y="350" class="log-text log-debug">[2026-05-05 08:25:02] DEBUG  | Rate limit check: 9150 req/s</text>
  
  <!-- Cursor -->
  <rect x="30" y="370" width="10" height="15" class="cursor blinking"/>
  <text x="45" y="382" class="log-text log-info">[Streaming...]</text>
</svg>