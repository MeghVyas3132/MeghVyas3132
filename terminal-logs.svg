  <text x="30" y="150" class="log-text log-info">[2026-03-09 08:05:43] INFO   | Metric exported: cpu_usage=95%</text>
  <text x="30" y="170" class="log-text log-info">[2026-03-09 08:05:45] INFO   | Database query optimized (94ms→13ms)</text>
  <text x="30" y="190" class="log-text log-info">[2026-03-09 08:05:47] INFO   | Backup completed: 998 MB</text>
  <text x="30" y="210" class="log-text log-info">[2026-03-09 08:05:49] INFO   | Request processed: 200 OK (19ms)</text>
  <text x="30" y="230" class="log-text log-info">[2026-03-09 08:05:51] INFO   | Metric exported: cpu_usage=77%</text>
  <text x="30" y="250" class="log-text log-info">[2026-03-09 08:05:53] INFO   | Request processed: 200 OK (25ms)</text>
