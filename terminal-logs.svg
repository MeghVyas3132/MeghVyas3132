<svg width="1200" height="400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .terminal-bg { fill: #0a0a0a; }
      .terminal-border { fill: none; stroke: #404040; stroke-width: 2; }
      .terminal-title { font: bold 16px 'Courier New', monospace; fill: #ffffff; }
      .log-text { font: 12px 'Courier New', monospace; }
      .log-info { fill: #fdba74; }
      .log-warn { fill: #fcd34d; }
      .log-debug { fill: #a8a29e; }
      .cursor { fill: #fdba74; }
      @keyframes blink {
        0%, 50% { opacity: 1; }
        51%, 100% { opacity: 0; }
      }
      .blinking { animation: blink 1s infinite; }
    </style>
  </defs>
  
  <rect width="1200" height="400" class="terminal-bg"/>
  <rect x="5" y="5" width="1190" height="390" class="terminal-border" rx="8"/>
  
  <!-- Terminal Header -->
  <rect x="15" y="15" width="1170" height="35" fill="#1a1a1a" rx="5"/>
  <text x="30" y="38" class="terminal-title">LIVE SYSTEM LOGS [LAST 60 SECONDS]</text>
  
  <!-- Log Lines -->
  <text x="30" y="70" class="log-text log-info">[2026-03-22 18:50:11] INFO   | Metric exported: cpu_usage=89%</text>
  <text x="30" y="90" class="log-text log-info">[2026-03-22 18:50:13] INFO   | Backup completed: 650 MB</text>
  <text x="30" y="110" class="log-text log-info">[2026-03-22 18:50:15] INFO   | Deploy rollout: 24/47 pods updated</text>
  <text x="30" y="130" class="log-text log-debug">[2026-03-22 18:50:17] DEBUG  | Circuit breaker: CLOSED</text>
  <text x="30" y="150" class="log-text log-debug">[2026-03-22 18:50:19] DEBUG  | Rate limit check: 5121 req/s</text>
  <text x="30" y="170" class="log-text log-info">[2026-03-22 18:50:21] INFO   | Pod payment-service-9d2e2 started</text>
  <text x="30" y="190" class="log-text log-info">[2026-03-22 18:50:23] INFO   | Health check passed: notification-svc</text>
  <text x="30" y="210" class="log-text log-info">[2026-03-22 18:50:25] INFO   | Database query optimized (85ms→22ms)</text>
  <text x="30" y="230" class="log-text log-info">[2026-03-22 18:50:27] INFO   | Request processed: 200 OK (49ms)</text>
  <text x="30" y="250" class="log-text log-info">[2026-03-22 18:50:29] INFO   | Database query optimized (54ms→25ms)</text>
  <text x="30" y="270" class="log-text log-debug">[2026-03-22 18:50:31] DEBUG  | Rate limit check: 6421 req/s</text>
  <text x="30" y="290" class="log-text log-debug">[2026-03-22 18:50:33] DEBUG  | Rate limit check: 6259 req/s</text>
  <text x="30" y="310" class="log-text log-info">[2026-03-22 18:50:35] INFO   | Pod auth-service-7e6a8 started</text>
  <text x="30" y="330" class="log-text log-info">[2026-03-22 18:50:37] INFO   | Load balancer: distributing traffic</text>
  <text x="30" y="350" class="log-text log-debug">[2026-03-22 18:50:39] DEBUG  | Cache hit: user:5b4b2</text>
  
  <!-- Cursor -->
  <rect x="30" y="370" width="10" height="15" class="cursor blinking"/>
  <text x="45" y="382" class="log-text log-info">[Streaming...]</text>
</svg>