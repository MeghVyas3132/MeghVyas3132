  <text x="30" y="130" class="log-text log-info">[2026-01-07 08:30:51] INFO   | Load balancer: distributing traffic</text>
  <text x="30" y="150" class="log-text log-info">[2026-01-07 08:30:53] INFO   | Pod user-service-3a1d1 started</text>
  <text x="30" y="170" class="log-text log-info">[2026-01-07 08:30:55] INFO   | Health check passed: notification-svc</text>
  <text x="30" y="190" class="log-text log-info">[2026-01-07 08:30:57] INFO   | Auto-scaling triggered: +2 pods</text>
  <text x="30" y="210" class="log-text log-info">[2026-01-07 08:30:59] INFO   | Container started: notification-svc-1a5b3</text>
  <text x="30" y="230" class="log-text log-info">[2026-01-07 08:31:01] INFO   | Pod notification-svc-7a5f2 started</text>
  <text x="30" y="250" class="log-text log-debug">[2026-01-07 08:31:03] DEBUG  | Circuit breaker: CLOSED</text>
  <text x="30" y="270" class="log-text log-info">[2026-01-07 08:31:05] INFO   | Request processed: 200 OK (25ms)</text>
  <text x="30" y="290" class="log-text log-info">[2026-01-07 08:31:07] INFO   | Request processed: 200 OK (16ms)</text>
  <text x="30" y="310" class="log-text log-debug">[2026-01-07 08:31:09] DEBUG  | Circuit breaker: CLOSED</text>
