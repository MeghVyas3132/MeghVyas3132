  <text x="30" y="190" class="log-text log-info">[2026-01-03 21:36:57] INFO   | Load balancer: distributing traffic</text>
  <text x="30" y="210" class="log-text log-info">[2026-01-03 21:36:59] INFO   | Health check passed: payment-service</text>
