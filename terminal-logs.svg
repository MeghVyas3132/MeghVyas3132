  <text x="30" y="150" class="log-text log-warn">[2026-06-08 12:00:19] WARN   | High latency detected: auth-service</text>
  <text x="30" y="170" class="log-text log-info">[2026-06-08 12:00:21] INFO   | Pod auth-service-3b5a5 started</text>
  <text x="30" y="190" class="log-text log-info">[2026-06-08 12:00:23] INFO   | Auto-scaling triggered: +1 pods</text>
  <text x="30" y="210" class="log-text log-info">[2026-06-08 12:00:25] INFO   | Pod notification-svc-9c6b5 started</text>
  <text x="30" y="230" class="log-text log-info">[2026-06-08 12:00:27] INFO   | Deploy rollout: 36/47 pods updated</text>
  <text x="30" y="250" class="log-text log-info">[2026-06-08 12:00:29] INFO   | Request processed: 200 OK (17ms)</text>
  <text x="30" y="270" class="log-text log-debug">[2026-06-08 12:00:31] DEBUG  | Circuit breaker: CLOSED</text>
  <text x="30" y="290" class="log-text log-debug">[2026-06-08 12:00:33] DEBUG  | Cache hit: user:3c8b8</text>
