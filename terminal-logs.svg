  <text x="30" y="350" class="log-text log-info">[2026-01-07 08:31:13] INFO   | Database query optimized (79ms→12ms)</text>
  
  <!-- Cursor -->
  <rect x="30" y="370" width="10" height="15" class="cursor blinking"/>
  <text x="45" y="382" class="log-text log-info">[Streaming...]</text>
</svg>