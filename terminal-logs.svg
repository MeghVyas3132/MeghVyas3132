<svg width="1200" height="400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .terminal-bg { fill: #0d1117; }
      .terminal-border { fill: none; stroke: #30363d; stroke-width: 2; }
      .terminal-title { font: bold 16px 'Courier New', monospace; fill: #58a6ff; }
      .log-text { font: 12px 'Courier New', monospace; }
      .log-info { fill: #3fb950; }
      .log-warn { fill: #d29922; }
      .log-debug { fill: #8b949e; }
      .cursor { fill: #58a6ff; }
      @keyframes blink {
        0%, 50% { opacity: 1; }
        51%, 100% { opacity: 0; }
      }
      .blinking { animation: blink 1s infinite; }
    </style>
  </defs>
  
  <rect width="1200" height="400" class="terminal-bg"/>
  <rect x="5" y="5" width="1190" height="390" class="terminal-border" rx="8"/>
  
  <!-- Terminal Header -->
  <rect x="15" y="15" width="1170" height="35" fill="#161b22" rx="5"/>
  <text x="30" y="38" class="terminal-title">📟 LIVE SYSTEM LOGS [LAST 60 SECONDS]</text>
  
  <!-- Log Lines -->
  <text x="30" y="70" class="log-text log-info">[2026-01-02 20:35:29] INFO   | Health check passed: notification-svc</text>
  <text x="30" y="90" class="log-text log-warn">[2026-01-02 20:35:31] WARN   | High latency detected: payment-service</text>
  <text x="30" y="110" class="log-text log-info">[2026-01-02 20:35:33] INFO   | Load balancer: distributing traffic</text>
  <text x="30" y="130" class="log-text log-info">[2026-01-02 20:35:35] INFO   | SSL cert renewed: *.meghvyas.dev</text>
  <text x="30" y="150" class="log-text log-debug">[2026-01-02 20:35:37] DEBUG  | Circuit breaker: CLOSED</text>
  <text x="30" y="170" class="log-text log-info">[2026-01-02 20:35:39] INFO   | Request processed: 200 OK (26ms)</text>
  <text x="30" y="190" class="log-text log-info">[2026-01-02 20:35:41] INFO   | Database query optimized (44ms→23ms)</text>
  <text x="30" y="210" class="log-text log-info">[2026-01-02 20:35:43] INFO   | Metric exported: cpu_usage=87%</text>
  <text x="30" y="230" class="log-text log-debug">[2026-01-02 20:35:45] DEBUG  | Cache hit: user:8d4b9</text>
  <text x="30" y="250" class="log-text log-info">[2026-01-02 20:35:47] INFO   | Metric exported: cpu_usage=86%</text>
  <text x="30" y="270" class="log-text log-info">[2026-01-02 20:35:49] INFO   | Backup completed: 854 MB</text>
  <text x="30" y="290" class="log-text log-info">[2026-01-02 20:35:51] INFO   | Pod payment-service-4d6f5 started</text>
  <text x="30" y="310" class="log-text log-info">[2026-01-02 20:35:53] INFO   | Container started: user-service-1d4d2</text>
  <text x="30" y="330" class="log-text log-debug">[2026-01-02 20:35:55] DEBUG  | Cache hit: user:2b2d7</text>
  <text x="30" y="350" class="log-text log-info">[2026-01-02 20:35:57] INFO   | Database query optimized (100ms→14ms)</text>
  
  <!-- Cursor -->
  <rect x="30" y="370" width="10" height="15" class="cursor blinking"/>
  <text x="45" y="382" class="log-text log-info">[Streaming...]</text>
</svg>