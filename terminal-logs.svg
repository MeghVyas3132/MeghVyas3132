  <text x="30" y="130" class="log-text log-info">[2026-04-30 19:43:01] INFO   | Pod auth-service-8c2a1 started</text>
  <text x="30" y="150" class="log-text log-debug">[2026-04-30 19:43:03] DEBUG  | Circuit breaker: CLOSED</text>
  <text x="30" y="170" class="log-text log-info">[2026-04-30 19:43:05] INFO   | Container started: auth-service-2d6c5</text>
  <text x="30" y="190" class="log-text log-info">[2026-04-30 19:43:07] INFO   | Metric exported: cpu_usage=77%</text>
  <text x="30" y="210" class="log-text log-info">[2026-04-30 19:43:09] INFO   | Request processed: 200 OK (30ms)</text>
  <text x="30" y="230" class="log-text log-warn">[2026-04-30 19:43:11] WARN   | High latency detected: api-gateway</text>
  <text x="30" y="250" class="log-text log-debug">[2026-04-30 19:43:13] DEBUG  | Cache hit: user:7b7b6</text>
