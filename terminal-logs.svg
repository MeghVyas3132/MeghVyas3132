  <text x="30" y="190" class="log-text log-debug">[2026-01-07 07:37:06] DEBUG  | Circuit breaker: CLOSED</text>
  <text x="30" y="210" class="log-text log-info">[2026-01-07 07:37:08] INFO   | Metric exported: cpu_usage=74%</text>
