  <text x="30" y="170" class="log-text log-info">[2026-03-29 10:03:05] INFO   | Auto-scaling triggered: +1 pods</text>
  <text x="30" y="190" class="log-text log-info">[2026-03-29 10:03:07] INFO   | Pod payment-service-2d4d1 started</text>
