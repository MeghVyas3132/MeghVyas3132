  <text x="30" y="190" class="log-text log-info">[2026-03-08 21:32:04] INFO   | Auto-scaling triggered: +1 pods</text>
  <text x="30" y="210" class="log-text log-info">[2026-03-08 21:32:06] INFO   | Container started: auth-service-5e8c2</text>
  <text x="30" y="230" class="log-text log-info">[2026-03-08 21:32:08] INFO   | Deploy rollout: 31/47 pods updated</text>
  <text x="30" y="250" class="log-text log-info">[2026-03-08 21:32:10] INFO   | Load balancer: distributing traffic</text>
