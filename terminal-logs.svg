  <text x="30" y="190" class="log-text log-info">[2026-04-09 23:35:26] INFO   | Load balancer: distributing traffic</text>
  <text x="30" y="210" class="log-text log-warn">[2026-04-09 23:35:28] WARN   | High latency detected: user-service</text>
  <text x="30" y="230" class="log-text log-warn">[2026-04-09 23:35:30] WARN   | High latency detected: auth-service</text>
  <text x="30" y="250" class="log-text log-info">[2026-04-09 23:35:32] INFO   | Metric exported: cpu_usage=76%</text>
  <text x="30" y="270" class="log-text log-info">[2026-04-09 23:35:34] INFO   | Deploy rollout: 39/47 pods updated</text>
  <text x="30" y="290" class="log-text log-info">[2026-04-09 23:35:36] INFO   | Deploy rollout: 21/47 pods updated</text>
  <text x="30" y="310" class="log-text log-info">[2026-04-09 23:35:38] INFO   | SSL cert renewed: *.meghvyas.dev</text>
  <text x="30" y="330" class="log-text log-warn">[2026-04-09 23:35:40] WARN   | High latency detected: api-gateway</text>
