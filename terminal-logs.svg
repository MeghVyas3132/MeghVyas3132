  <text x="30" y="150" class="log-text log-info">[2026-01-09 22:20:34] INFO   | Backup completed: 580 MB</text>
  <text x="30" y="170" class="log-text log-debug">[2026-01-09 22:20:36] DEBUG  | Cache hit: user:5d1e2</text>
  <text x="30" y="190" class="log-text log-info">[2026-01-09 22:20:38] INFO   | Database query optimized (63ms→18ms)</text>
  <text x="30" y="210" class="log-text log-debug">[2026-01-09 22:20:40] DEBUG  | Circuit breaker: CLOSED</text>
  <text x="30" y="230" class="log-text log-info">[2026-01-09 22:20:42] INFO   | Health check passed: auth-service</text>
  <text x="30" y="250" class="log-text log-warn">[2026-01-09 22:20:44] WARN   | High latency detected: user-service</text>
