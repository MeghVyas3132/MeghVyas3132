  <text x="30" y="190" class="log-text log-info">[2026-03-21 20:14:45] INFO   | Deploy rollout: 37/47 pods updated</text>
  <text x="30" y="210" class="log-text log-info">[2026-03-21 20:14:47] INFO   | Database query optimized (51ms→19ms)</text>
