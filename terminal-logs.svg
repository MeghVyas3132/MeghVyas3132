<svg width="1200" height="400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .terminal-bg { fill: #0a0a0a; }
      .terminal-border { fill: none; stroke: #404040; stroke-width: 2; }
      .terminal-title { font: bold 16px 'Courier New', monospace; fill: #ffffff; }
      .log-text { font: 12px 'Courier New', monospace; }
      .log-info { fill: #fdba74; }
      .log-warn { fill: #fcd34d; }
      .log-debug { fill: #a8a29e; }
      .cursor { fill: #fdba74; }
      @keyframes blink {
        0%, 50% { opacity: 1; }
        51%, 100% { opacity: 0; }
      }
      .blinking { animation: blink 1s infinite; }
    </style>
  </defs>
  
  <rect width="1200" height="400" class="terminal-bg"/>
  <rect x="5" y="5" width="1190" height="390" class="terminal-border" rx="8"/>
  
  <!-- Terminal Header -->
  <rect x="15" y="15" width="1170" height="35" fill="#1a1a1a" rx="5"/>
  <text x="30" y="38" class="terminal-title">LIVE SYSTEM LOGS [LAST 60 SECONDS]</text>
  
  <!-- Log Lines -->
  <text x="30" y="70" class="log-text log-info">[2026-03-04 05:59:20] INFO   | Load balancer: distributing traffic</text>
  <text x="30" y="90" class="log-text log-info">[2026-03-04 05:59:22] INFO   | Container started: notification-svc-4e2a3</text>
  <text x="30" y="110" class="log-text log-debug">[2026-03-04 05:59:24] DEBUG  | Cache hit: user:3f2e5</text>
  <text x="30" y="130" class="log-text log-info">[2026-03-04 05:59:26] INFO   | Container started: api-gateway-2d5b6</text>
  <text x="30" y="150" class="log-text log-info">[2026-03-04 05:59:28] INFO   | Backup completed: 803 MB</text>
  <text x="30" y="170" class="log-text log-warn">[2026-03-04 05:59:30] WARN   | High latency detected: user-service</text>
  <text x="30" y="190" class="log-text log-info">[2026-03-04 05:59:32] INFO   | Health check passed: auth-service</text>
  <text x="30" y="210" class="log-text log-info">[2026-03-04 05:59:34] INFO   | Pod auth-service-8c2a6 started</text>
  <text x="30" y="230" class="log-text log-info">[2026-03-04 05:59:36] INFO   | Load balancer: distributing traffic</text>
  <text x="30" y="250" class="log-text log-info">[2026-03-04 05:59:38] INFO   | Pod user-service-2a1e9 started</text>
  <text x="30" y="270" class="log-text log-info">[2026-03-04 05:59:40] INFO   | Pod auth-service-8a3c4 started</text>
  <text x="30" y="290" class="log-text log-info">[2026-03-04 05:59:42] INFO   | Metric exported: cpu_usage=82%</text>
  <text x="30" y="310" class="log-text log-debug">[2026-03-04 05:59:44] DEBUG  | Circuit breaker: CLOSED</text>
  <text x="30" y="330" class="log-text log-info">[2026-03-04 05:59:46] INFO   | Container started: api-gateway-9a8f9</text>
  <text x="30" y="350" class="log-text log-info">[2026-03-04 05:59:48] INFO   | Pod payment-service-5d6b8 started</text>
  
  <!-- Cursor -->
  <rect x="30" y="370" width="10" height="15" class="cursor blinking"/>
  <text x="45" y="382" class="log-text log-info">[Streaming...]</text>
</svg>