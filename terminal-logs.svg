  <text x="30" y="150" class="log-text log-info">[2026-03-24 21:47:53] INFO   | Pod auth-service-3f2c4 started</text>
  <text x="30" y="170" class="log-text log-info">[2026-03-24 21:47:55] INFO   | SSL cert renewed: *.meghvyas.dev</text>
  <text x="30" y="190" class="log-text log-info">[2026-03-24 21:47:57] INFO   | Load balancer: distributing traffic</text>
  <text x="30" y="210" class="log-text log-debug">[2026-03-24 21:47:59] DEBUG  | Circuit breaker: CLOSED</text>
  <text x="30" y="230" class="log-text log-info">[2026-03-24 21:48:01] INFO   | SSL cert renewed: *.meghvyas.dev</text>
