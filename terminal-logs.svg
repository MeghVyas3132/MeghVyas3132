<svg width="1200" height="400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .terminal-bg { fill: #0a0a0a; }
      .terminal-border { fill: none; stroke: #404040; stroke-width: 2; }
      .terminal-title { font: bold 16px 'Courier New', monospace; fill: #ffffff; }
      .log-text { font: 12px 'Courier New', monospace; }
      .log-info { fill: #fdba74; }
      .log-warn { fill: #fcd34d; }
      .log-debug { fill: #a8a29e; }
      .cursor { fill: #fdba74; }
      @keyframes blink {
        0%, 50% { opacity: 1; }
        51%, 100% { opacity: 0; }
      }
      .blinking { animation: blink 1s infinite; }
    </style>
  </defs>
  
  <rect width="1200" height="400" class="terminal-bg"/>
  <rect x="5" y="5" width="1190" height="390" class="terminal-border" rx="8"/>
  
  <!-- Terminal Header -->
  <rect x="15" y="15" width="1170" height="35" fill="#1a1a1a" rx="5"/>
  <text x="30" y="38" class="terminal-title">LIVE SYSTEM LOGS [LAST 60 SECONDS]</text>
  
  <!-- Log Lines -->
  <text x="30" y="70" class="log-text log-info">[2026-04-26 08:00:54] INFO   | Database query optimized (63ms→19ms)</text>
  <text x="30" y="90" class="log-text log-info">[2026-04-26 08:00:56] INFO   | Deploy rollout: 37/47 pods updated</text>
  <text x="30" y="110" class="log-text log-info">[2026-04-26 08:00:58] INFO   | Load balancer: distributing traffic</text>
  <text x="30" y="130" class="log-text log-info">[2026-04-26 08:01:00] INFO   | Pod notification-svc-5d3c3 started</text>
  <text x="30" y="150" class="log-text log-debug">[2026-04-26 08:01:02] DEBUG  | Cache hit: user:5a6f6</text>
  <text x="30" y="170" class="log-text log-info">[2026-04-26 08:01:04] INFO   | Metric exported: cpu_usage=73%</text>
  <text x="30" y="190" class="log-text log-debug">[2026-04-26 08:01:06] DEBUG  | Circuit breaker: CLOSED</text>
  <text x="30" y="210" class="log-text log-info">[2026-04-26 08:01:08] INFO   | Container started: payment-service-2c4f3</text>
  <text x="30" y="230" class="log-text log-warn">[2026-04-26 08:01:10] WARN   | High latency detected: auth-service</text>
  <text x="30" y="250" class="log-text log-info">[2026-04-26 08:01:12] INFO   | Metric exported: cpu_usage=84%</text>
  <text x="30" y="270" class="log-text log-info">[2026-04-26 08:01:14] INFO   | Database query optimized (81ms→14ms)</text>
  <text x="30" y="290" class="log-text log-info">[2026-04-26 08:01:16] INFO   | Pod user-service-5f6f9 started</text>
  <text x="30" y="310" class="log-text log-info">[2026-04-26 08:01:18] INFO   | Health check passed: auth-service</text>
  <text x="30" y="330" class="log-text log-info">[2026-04-26 08:01:20] INFO   | Load balancer: distributing traffic</text>
  <text x="30" y="350" class="log-text log-info">[2026-04-26 08:01:22] INFO   | Container started: api-gateway-2b3e6</text>
  
  <!-- Cursor -->
  <rect x="30" y="370" width="10" height="15" class="cursor blinking"/>
  <text x="45" y="382" class="log-text log-info">[Streaming...]</text>
</svg>