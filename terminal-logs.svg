  <text x="30" y="110" class="log-text log-info">[2026-03-26 20:47:10] INFO   | Backup completed: 843 MB</text>
  <text x="30" y="130" class="log-text log-debug">[2026-03-26 20:47:12] DEBUG  | Rate limit check: 9477 req/s</text>
  <text x="30" y="150" class="log-text log-info">[2026-03-26 20:47:14] INFO   | Deploy rollout: 39/47 pods updated</text>
  <text x="30" y="170" class="log-text log-debug">[2026-03-26 20:47:16] DEBUG  | Rate limit check: 8863 req/s</text>
  <text x="30" y="190" class="log-text log-info">[2026-03-26 20:47:18] INFO   | Metric exported: cpu_usage=80%</text>
  <text x="30" y="210" class="log-text log-debug">[2026-03-26 20:47:20] DEBUG  | Circuit breaker: CLOSED</text>
  <text x="30" y="230" class="log-text log-info">[2026-03-26 20:47:22] INFO   | Request processed: 200 OK (19ms)</text>
  <text x="30" y="250" class="log-text log-debug">[2026-03-26 20:47:24] DEBUG  | Circuit breaker: CLOSED</text>
  <text x="30" y="270" class="log-text log-info">[2026-03-26 20:47:26] INFO   | Request processed: 200 OK (24ms)</text>
  <text x="30" y="290" class="log-text log-warn">[2026-03-26 20:47:28] WARN   | High latency detected: payment-service</text>
  <text x="30" y="310" class="log-text log-info">[2026-03-26 20:47:30] INFO   | Load balancer: distributing traffic</text>
