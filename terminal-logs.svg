  <text x="30" y="150" class="log-text log-info">[2026-01-01 13:47:50] INFO   | Load balancer: distributing traffic</text>
  <text x="30" y="170" class="log-text log-debug">[2026-01-01 13:47:52] DEBUG  | Cache hit: user:2c4c6</text>
  <text x="30" y="190" class="log-text log-info">[2026-01-01 13:47:54] INFO   | SSL cert renewed: *.meghvyas.dev</text>
  <text x="30" y="210" class="log-text log-warn">[2026-01-01 13:47:56] WARN   | High latency detected: payment-service</text>
  <text x="30" y="230" class="log-text log-warn">[2026-01-01 13:47:58] WARN   | High latency detected: user-service</text>
  <text x="30" y="250" class="log-text log-info">[2026-01-01 13:48:00] INFO   | Metric exported: cpu_usage=92%</text>
  <text x="30" y="270" class="log-text log-debug">[2026-01-01 13:48:02] DEBUG  | Cache hit: user:1b9b8</text>
  <text x="30" y="290" class="log-text log-info">[2026-01-01 13:48:04] INFO   | Pod auth-service-7d2f8 started</text>
