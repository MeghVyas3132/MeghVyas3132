  <text x="30" y="190" class="log-text log-info">[2026-01-02 17:34:49] INFO   | Pod api-gateway-7e6c3 started</text>
  <text x="30" y="210" class="log-text log-info">[2026-01-02 17:34:51] INFO   | Metric exported: cpu_usage=72%</text>
  <text x="30" y="230" class="log-text log-info">[2026-01-02 17:34:53] INFO   | Container started: auth-service-3b3b6</text>
