  <text x="30" y="330" class="log-text log-info">[2026-01-01 13:48:08] INFO   | Auto-scaling triggered: +2 pods</text>
  <text x="30" y="350" class="log-text log-debug">[2026-01-01 13:48:10] DEBUG  | Rate limit check: 5900 req/s</text>
  
  <!-- Cursor -->
  <rect x="30" y="370" width="10" height="15" class="cursor blinking"/>
  <text x="45" y="382" class="log-text log-info">[Streaming...]</text>
</svg>