  <text x="30" y="130" class="log-text log-debug">[2026-03-22 17:59:31] DEBUG  | Cache hit: user:1d3b1</text>
  <text x="30" y="150" class="log-text log-info">[2026-03-22 17:59:33] INFO   | Database query optimized (93ms→13ms)</text>
  <text x="30" y="170" class="log-text log-warn">[2026-03-22 17:59:35] WARN   | High latency detected: auth-service</text>
  <text x="30" y="190" class="log-text log-info">[2026-03-22 17:59:37] INFO   | Request processed: 200 OK (30ms)</text>
  <text x="30" y="210" class="log-text log-info">[2026-03-22 17:59:39] INFO   | Health check passed: api-gateway</text>
  <text x="30" y="230" class="log-text log-info">[2026-03-22 17:59:41] INFO   | Health check passed: notification-svc</text>
  <text x="30" y="250" class="log-text log-info">[2026-03-22 17:59:43] INFO   | Load balancer: distributing traffic</text>
  <text x="30" y="270" class="log-text log-info">[2026-03-22 17:59:45] INFO   | Database query optimized (90ms→12ms)</text>
  <text x="30" y="290" class="log-text log-info">[2026-03-22 17:59:47] INFO   | SSL cert renewed: *.meghvyas.dev</text>
  <text x="30" y="310" class="log-text log-info">[2026-03-22 17:59:49] INFO   | Backup completed: 1000 MB</text>
  <text x="30" y="330" class="log-text log-info">[2026-03-22 17:59:51] INFO   | Pod user-service-1b6a3 started</text>
