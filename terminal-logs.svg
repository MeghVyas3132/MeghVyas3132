  <text x="30" y="150" class="log-text log-debug">[2026-04-10 21:51:40] DEBUG  | Cache hit: user:8a6d4</text>
  <text x="30" y="170" class="log-text log-debug">[2026-04-10 21:51:42] DEBUG  | Cache hit: user:4e2f4</text>
  <text x="30" y="190" class="log-text log-info">[2026-04-10 21:51:44] INFO   | Pod auth-service-1f4b8 started</text>
  <text x="30" y="210" class="log-text log-info">[2026-04-10 21:51:46] INFO   | Load balancer: distributing traffic</text>
  <text x="30" y="230" class="log-text log-debug">[2026-04-10 21:51:48] DEBUG  | Cache hit: user:5e8b1</text>
  <text x="30" y="250" class="log-text log-info">[2026-04-10 21:51:50] INFO   | SSL cert renewed: *.meghvyas.dev</text>
