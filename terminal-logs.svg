  <text x="30" y="150" class="log-text log-info">[2026-01-03 20:31:22] INFO   | SSL cert renewed: *.meghvyas.dev</text>
  <text x="30" y="170" class="log-text log-info">[2026-01-03 20:31:24] INFO   | Backup completed: 609 MB</text>
  <text x="30" y="190" class="log-text log-debug">[2026-01-03 20:31:26] DEBUG  | Cache hit: user:8b2f6</text>
  <text x="30" y="210" class="log-text log-info">[2026-01-03 20:31:28] INFO   | Request processed: 200 OK (39ms)</text>
  <text x="30" y="230" class="log-text log-info">[2026-01-03 20:31:30] INFO   | Container started: notification-svc-5b8e7</text>
  <text x="30" y="250" class="log-text log-info">[2026-01-03 20:31:32] INFO   | Deploy rollout: 26/47 pods updated</text>
