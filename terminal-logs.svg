<svg width="1200" height="400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .terminal-bg { fill: #0a0a0a; }
      .terminal-border { fill: none; stroke: #404040; stroke-width: 2; }
      .terminal-title { font: bold 16px 'Courier New', monospace; fill: #ffffff; }
      .log-text { font: 12px 'Courier New', monospace; }
      .log-info { fill: #fdba74; }
      .log-warn { fill: #fcd34d; }
      .log-debug { fill: #a8a29e; }
      .cursor { fill: #fdba74; }
      @keyframes blink {
        0%, 50% { opacity: 1; }
        51%, 100% { opacity: 0; }
      }
      .blinking { animation: blink 1s infinite; }
    </style>
  </defs>
  
  <rect width="1200" height="400" class="terminal-bg"/>
  <rect x="5" y="5" width="1190" height="390" class="terminal-border" rx="8"/>
  
  <!-- Terminal Header -->
  <rect x="15" y="15" width="1170" height="35" fill="#1a1a1a" rx="5"/>
  <text x="30" y="38" class="terminal-title">LIVE SYSTEM LOGS [LAST 60 SECONDS]</text>
  
  <!-- Log Lines -->
  <text x="30" y="70" class="log-text log-debug">[2026-04-19 22:17:25] DEBUG  | Cache hit: user:1b5c2</text>
  <text x="30" y="90" class="log-text log-warn">[2026-04-19 22:17:27] WARN   | High latency detected: user-service</text>
  <text x="30" y="110" class="log-text log-info">[2026-04-19 22:17:29] INFO   | Deploy rollout: 25/47 pods updated</text>
  <text x="30" y="130" class="log-text log-info">[2026-04-19 22:17:31] INFO   | Load balancer: distributing traffic</text>
  <text x="30" y="150" class="log-text log-debug">[2026-04-19 22:17:33] DEBUG  | Cache hit: user:9c2e7</text>
  <text x="30" y="170" class="log-text log-debug">[2026-04-19 22:17:35] DEBUG  | Cache hit: user:3d2d6</text>
  <text x="30" y="190" class="log-text log-info">[2026-04-19 22:17:37] INFO   | Pod auth-service-2a8c9 started</text>
  <text x="30" y="210" class="log-text log-info">[2026-04-19 22:17:39] INFO   | Load balancer: distributing traffic</text>
  <text x="30" y="230" class="log-text log-info">[2026-04-19 22:17:41] INFO   | Container started: notification-svc-5c5b9</text>
  <text x="30" y="250" class="log-text log-info">[2026-04-19 22:17:43] INFO   | Health check passed: auth-service</text>
  <text x="30" y="270" class="log-text log-info">[2026-04-19 22:17:45] INFO   | Request processed: 200 OK (20ms)</text>
  <text x="30" y="290" class="log-text log-info">[2026-04-19 22:17:47] INFO   | Health check passed: notification-svc</text>
  <text x="30" y="310" class="log-text log-info">[2026-04-19 22:17:49] INFO   | Deploy rollout: 39/47 pods updated</text>
  <text x="30" y="330" class="log-text log-info">[2026-04-19 22:17:51] INFO   | Health check passed: api-gateway</text>
  <text x="30" y="350" class="log-text log-debug">[2026-04-19 22:17:53] DEBUG  | Rate limit check: 5354 req/s</text>
  
  <!-- Cursor -->
  <rect x="30" y="370" width="10" height="15" class="cursor blinking"/>
