<svg width="1200" height="400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .terminal-bg { fill: #0a0a0a; }
      .terminal-border { fill: none; stroke: #404040; stroke-width: 2; }
      .terminal-title { font: bold 16px 'Courier New', monospace; fill: #ffffff; }
      .log-text { font: 12px 'Courier New', monospace; }
      .log-info { fill: #fdba74; }
      .log-warn { fill: #fcd34d; }
      .log-debug { fill: #a8a29e; }
      .cursor { fill: #fdba74; }
      @keyframes blink {
        0%, 50% { opacity: 1; }
        51%, 100% { opacity: 0; }
      }
      .blinking { animation: blink 1s infinite; }
    </style>
  </defs>
  
  <rect width="1200" height="400" class="terminal-bg"/>
  <rect x="5" y="5" width="1190" height="390" class="terminal-border" rx="8"/>
  
  <!-- Terminal Header -->
  <rect x="15" y="15" width="1170" height="35" fill="#1a1a1a" rx="5"/>
  <text x="30" y="38" class="terminal-title">LIVE SYSTEM LOGS [LAST 60 SECONDS]</text>
  
  <!-- Log Lines -->
  <text x="30" y="70" class="log-text log-info">[2026-05-20 08:45:09] INFO   | Request processed: 200 OK (47ms)</text>
  <text x="30" y="90" class="log-text log-info">[2026-05-20 08:45:11] INFO   | Pod api-gateway-7d1e2 started</text>
  <text x="30" y="110" class="log-text log-debug">[2026-05-20 08:45:13] DEBUG  | Cache hit: user:1a4c8</text>
  <text x="30" y="130" class="log-text log-info">[2026-05-20 08:45:15] INFO   | Health check passed: api-gateway</text>
  <text x="30" y="150" class="log-text log-info">[2026-05-20 08:45:17] INFO   | Health check passed: auth-service</text>
  <text x="30" y="170" class="log-text log-debug">[2026-05-20 08:45:19] DEBUG  | Circuit breaker: CLOSED</text>
  <text x="30" y="190" class="log-text log-debug">[2026-05-20 08:45:21] DEBUG  | Cache hit: user:9a1c3</text>
  <text x="30" y="210" class="log-text log-debug">[2026-05-20 08:45:23] DEBUG  | Rate limit check: 5868 req/s</text>
  <text x="30" y="230" class="log-text log-info">[2026-05-20 08:45:25] INFO   | Auto-scaling triggered: +3 pods</text>
  <text x="30" y="250" class="log-text log-info">[2026-05-20 08:45:27] INFO   | Deploy rollout: 21/47 pods updated</text>
  <text x="30" y="270" class="log-text log-info">[2026-05-20 08:45:29] INFO   | Metric exported: cpu_usage=70%</text>
  <text x="30" y="290" class="log-text log-info">[2026-05-20 08:45:31] INFO   | Database query optimized (54ms→16ms)</text>
  <text x="30" y="310" class="log-text log-info">[2026-05-20 08:45:33] INFO   | Container started: api-gateway-7f3c7</text>
  <text x="30" y="330" class="log-text log-info">[2026-05-20 08:45:35] INFO   | Deploy rollout: 31/47 pods updated</text>
  <text x="30" y="350" class="log-text log-info">[2026-05-20 08:45:37] INFO   | Health check passed: payment-service</text>
  
  <!-- Cursor -->
  <rect x="30" y="370" width="10" height="15" class="cursor blinking"/>
  <text x="45" y="382" class="log-text log-info">[Streaming...]</text>
</svg>