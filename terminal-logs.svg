  <text x="30" y="190" class="log-text log-info">[2025-12-30 22:00:17] INFO   | Auto-scaling triggered: +2 pods</text>
  <text x="30" y="210" class="log-text log-info">[2025-12-30 22:00:19] INFO   | Container started: notification-svc-5c6d2</text>
  <text x="30" y="230" class="log-text log-debug">[2025-12-30 22:00:21] DEBUG  | Circuit breaker: CLOSED</text>
  <text x="30" y="250" class="log-text log-debug">[2025-12-30 22:00:23] DEBUG  | Rate limit check: 6750 req/s</text>
  <text x="30" y="270" class="log-text log-info">[2025-12-30 22:00:25] INFO   | Pod auth-service-6d5f1 started</text>
  <text x="30" y="290" class="log-text log-info">[2025-12-30 22:00:27] INFO   | Metric exported: cpu_usage=79%</text>
