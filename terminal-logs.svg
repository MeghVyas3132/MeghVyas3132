<svg width="1200" height="400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .terminal-bg { fill: #0d1117; }
      .terminal-border { fill: none; stroke: #30363d; stroke-width: 2; }
      .terminal-title { font: bold 16px 'Courier New', monospace; fill: #58a6ff; }
      .log-text { font: 12px 'Courier New', monospace; }
      .log-info { fill: #3fb950; }
      .log-warn { fill: #d29922; }
      .log-debug { fill: #8b949e; }
      .cursor { fill: #58a6ff; }
      @keyframes blink {
        0%, 50% { opacity: 1; }
        51%, 100% { opacity: 0; }
      }
      .blinking { animation: blink 1s infinite; }
    </style>
  </defs>
  
  <rect width="1200" height="400" class="terminal-bg"/>
  <rect x="5" y="5" width="1190" height="390" class="terminal-border" rx="8"/>
  
  <!-- Terminal Header -->
  <rect x="15" y="15" width="1170" height="35" fill="#161b22" rx="5"/>
  <text x="30" y="38" class="terminal-title">📟 LIVE SYSTEM LOGS [LAST 60 SECONDS]</text>
  
  <!-- Log Lines -->
  <text x="30" y="70" class="log-text log-info">[2025-12-31 21:21:43] INFO   | Metric exported: cpu_usage=89%</text>
  <text x="30" y="90" class="log-text log-info">[2025-12-31 21:21:45] INFO   | Request processed: 200 OK (32ms)</text>
  <text x="30" y="110" class="log-text log-info">[2025-12-31 21:21:47] INFO   | Backup completed: 885 MB</text>
  <text x="30" y="130" class="log-text log-warn">[2025-12-31 21:21:49] WARN   | High latency detected: user-service</text>
  <text x="30" y="150" class="log-text log-warn">[2025-12-31 21:21:51] WARN   | High latency detected: api-gateway</text>
  <text x="30" y="170" class="log-text log-debug">[2025-12-31 21:21:53] DEBUG  | Circuit breaker: CLOSED</text>
  <text x="30" y="190" class="log-text log-info">[2025-12-31 21:21:55] INFO   | Metric exported: cpu_usage=84%</text>
  <text x="30" y="210" class="log-text log-info">[2025-12-31 21:21:57] INFO   | Deploy rollout: 36/47 pods updated</text>
  <text x="30" y="230" class="log-text log-info">[2025-12-31 21:21:59] INFO   | Load balancer: distributing traffic</text>
  <text x="30" y="250" class="log-text log-info">[2025-12-31 21:22:01] INFO   | Pod api-gateway-7f1b8 started</text>
  <text x="30" y="270" class="log-text log-info">[2025-12-31 21:22:03] INFO   | Backup completed: 923 MB</text>
  <text x="30" y="290" class="log-text log-info">[2025-12-31 21:22:05] INFO   | SSL cert renewed: *.meghvyas.dev</text>
  <text x="30" y="310" class="log-text log-warn">[2025-12-31 21:22:07] WARN   | High latency detected: user-service</text>
  <text x="30" y="330" class="log-text log-info">[2025-12-31 21:22:09] INFO   | Health check passed: api-gateway</text>
  <text x="30" y="350" class="log-text log-debug">[2025-12-31 21:22:11] DEBUG  | Circuit breaker: CLOSED</text>
  
  <!-- Cursor -->
  <rect x="30" y="370" width="10" height="15" class="cursor blinking"/>
