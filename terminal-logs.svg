  <text x="30" y="150" class="log-text log-info">[2026-04-10 09:55:13] INFO   | Health check passed: api-gateway</text>
  <text x="30" y="170" class="log-text log-info">[2026-04-10 09:55:15] INFO   | Auto-scaling triggered: +1 pods</text>
  <text x="30" y="190" class="log-text log-info">[2026-04-10 09:55:17] INFO   | Health check passed: user-service</text>
  <text x="30" y="210" class="log-text log-debug">[2026-04-10 09:55:19] DEBUG  | Circuit breaker: CLOSED</text>
  <text x="30" y="230" class="log-text log-info">[2026-04-10 09:55:21] INFO   | Container started: api-gateway-6b6c5</text>
  <text x="30" y="250" class="log-text log-debug">[2026-04-10 09:55:23] DEBUG  | Circuit breaker: CLOSED</text>
  <text x="30" y="270" class="log-text log-info">[2026-04-10 09:55:25] INFO   | Database query optimized (59ms→22ms)</text>
  <text x="30" y="290" class="log-text log-warn">[2026-04-10 09:55:27] WARN   | High latency detected: payment-service</text>
