<svg width="1200" height="400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .terminal-bg { fill: #0a0a0a; }
      .terminal-border { fill: none; stroke: #404040; stroke-width: 2; }
      .terminal-title { font: bold 16px 'Courier New', monospace; fill: #ffffff; }
      .log-text { font: 12px 'Courier New', monospace; }
      .log-info { fill: #fdba74; }
      .log-warn { fill: #fcd34d; }
      .log-debug { fill: #a8a29e; }
      .cursor { fill: #fdba74; }
      @keyframes blink {
        0%, 50% { opacity: 1; }
        51%, 100% { opacity: 0; }
      }
      .blinking { animation: blink 1s infinite; }
    </style>
  </defs>
  
  <rect width="1200" height="400" class="terminal-bg"/>
  <rect x="5" y="5" width="1190" height="390" class="terminal-border" rx="8"/>
  
  <!-- Terminal Header -->
  <rect x="15" y="15" width="1170" height="35" fill="#1a1a1a" rx="5"/>
  <text x="30" y="38" class="terminal-title">LIVE SYSTEM LOGS [LAST 60 SECONDS]</text>
  
  <!-- Log Lines -->
  <text x="30" y="70" class="log-text log-warn">[2026-03-15 15:26:36] WARN   | High latency detected: api-gateway</text>
  <text x="30" y="90" class="log-text log-debug">[2026-03-15 15:26:38] DEBUG  | Rate limit check: 9800 req/s</text>
  <text x="30" y="110" class="log-text log-info">[2026-03-15 15:26:40] INFO   | Metric exported: cpu_usage=88%</text>
  <text x="30" y="130" class="log-text log-debug">[2026-03-15 15:26:42] DEBUG  | Rate limit check: 8534 req/s</text>
  <text x="30" y="150" class="log-text log-debug">[2026-03-15 15:26:44] DEBUG  | Circuit breaker: CLOSED</text>
  <text x="30" y="170" class="log-text log-debug">[2026-03-15 15:26:46] DEBUG  | Rate limit check: 8981 req/s</text>
  <text x="30" y="190" class="log-text log-info">[2026-03-15 15:26:48] INFO   | Container started: notification-svc-3b8b8</text>
  <text x="30" y="210" class="log-text log-info">[2026-03-15 15:26:50] INFO   | Auto-scaling triggered: +2 pods</text>
  <text x="30" y="230" class="log-text log-info">[2026-03-15 15:26:52] INFO   | Auto-scaling triggered: +1 pods</text>
  <text x="30" y="250" class="log-text log-info">[2026-03-15 15:26:54] INFO   | Backup completed: 706 MB</text>
  <text x="30" y="270" class="log-text log-info">[2026-03-15 15:26:56] INFO   | Backup completed: 610 MB</text>
  <text x="30" y="290" class="log-text log-info">[2026-03-15 15:26:58] INFO   | Backup completed: 832 MB</text>
  <text x="30" y="310" class="log-text log-info">[2026-03-15 15:27:00] INFO   | Backup completed: 598 MB</text>
  <text x="30" y="330" class="log-text log-info">[2026-03-15 15:27:02] INFO   | Pod user-service-1a8b2 started</text>
  <text x="30" y="350" class="log-text log-info">[2026-03-15 15:27:04] INFO   | Pod api-gateway-7b4e8 started</text>
  
  <!-- Cursor -->
  <rect x="30" y="370" width="10" height="15" class="cursor blinking"/>
  <text x="45" y="382" class="log-text log-info">[Streaming...]</text>
</svg>