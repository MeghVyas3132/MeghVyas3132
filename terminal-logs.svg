  <text x="30" y="130" class="log-text log-info">[2026-04-17 20:59:31] INFO   | Metric exported: cpu_usage=90%</text>
  <text x="30" y="150" class="log-text log-info">[2026-04-17 20:59:33] INFO   | Deploy rollout: 25/47 pods updated</text>
  <text x="30" y="170" class="log-text log-debug">[2026-04-17 20:59:35] DEBUG  | Cache hit: user:4f2b9</text>
  <text x="30" y="190" class="log-text log-info">[2026-04-17 20:59:37] INFO   | Pod auth-service-4b7d5 started</text>
  <text x="30" y="210" class="log-text log-debug">[2026-04-17 20:59:39] DEBUG  | Cache hit: user:4d8c1</text>
  <text x="30" y="230" class="log-text log-info">[2026-04-17 20:59:41] INFO   | Health check passed: auth-service</text>
  <text x="30" y="250" class="log-text log-info">[2026-04-17 20:59:43] INFO   | Health check passed: user-service</text>
  <text x="30" y="270" class="log-text log-info">[2026-04-17 20:59:45] INFO   | Pod payment-service-8d4f4 started</text>
  <text x="30" y="290" class="log-text log-warn">[2026-04-17 20:59:47] WARN   | High latency detected: api-gateway</text>
