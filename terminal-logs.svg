  <text x="30" y="170" class="log-text log-info">[2026-07-14 21:41:49] INFO   | Backup completed: 541 MB</text>
  <text x="30" y="190" class="log-text log-info">[2026-07-14 21:41:51] INFO   | Database query optimized (86ms→16ms)</text>
  <text x="30" y="210" class="log-text log-info">[2026-07-14 21:41:53] INFO   | Health check passed: api-gateway</text>
