  <text x="30" y="210" class="log-text log-debug">[2026-03-30 09:23:53] DEBUG  | Cache hit: user:1f5e4</text>
  <text x="30" y="230" class="log-text log-debug">[2026-03-30 09:23:55] DEBUG  | Cache hit: user:2b5b6</text>
  <text x="30" y="250" class="log-text log-info">[2026-03-30 09:23:57] INFO   | Deploy rollout: 21/47 pods updated</text>
