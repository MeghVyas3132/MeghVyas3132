  <text x="30" y="130" class="log-text log-info">[2025-12-31 19:23:48] INFO   | Metric exported: cpu_usage=87%</text>
  <text x="30" y="150" class="log-text log-info">[2025-12-31 19:23:50] INFO   | Load balancer: distributing traffic</text>
  <text x="30" y="170" class="log-text log-info">[2025-12-31 19:23:52] INFO   | Pod user-service-4d5c1 started</text>
  <text x="30" y="190" class="log-text log-info">[2025-12-31 19:23:54] INFO   | Health check passed: auth-service</text>
  <text x="30" y="210" class="log-text log-debug">[2025-12-31 19:23:56] DEBUG  | Rate limit check: 7865 req/s</text>
  <text x="30" y="230" class="log-text log-warn">[2025-12-31 19:23:58] WARN   | High latency detected: user-service</text>
  <text x="30" y="250" class="log-text log-warn">[2025-12-31 19:24:00] WARN   | High latency detected: user-service</text>
  <text x="30" y="270" class="log-text log-info">[2025-12-31 19:24:02] INFO   | Auto-scaling triggered: +1 pods</text>
  <text x="30" y="290" class="log-text log-info">[2025-12-31 19:24:04] INFO   | Pod payment-service-6f3f5 started</text>
