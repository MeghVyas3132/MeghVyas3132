  <text x="30" y="150" class="log-text log-info">[2026-06-26 05:57:45] INFO   | Metric exported: cpu_usage=94%</text>
  <text x="30" y="170" class="log-text log-info">[2026-06-26 05:57:47] INFO   | Pod payment-service-7a3d5 started</text>
  <text x="30" y="190" class="log-text log-info">[2026-06-26 05:57:49] INFO   | Request processed: 200 OK (40ms)</text>
  <text x="30" y="210" class="log-text log-info">[2026-06-26 05:57:51] INFO   | Load balancer: distributing traffic</text>
