  <text x="30" y="290" class="log-text log-info">[2026-04-04 05:45:36] INFO   | Backup completed: 500 MB</text>
  <text x="30" y="310" class="log-text log-debug">[2026-04-04 05:45:38] DEBUG  | Cache hit: user:2e7e5</text>
  <text x="30" y="330" class="log-text log-info">[2026-04-04 05:45:40] INFO   | Metric exported: cpu_usage=77%</text>
  <text x="30" y="350" class="log-text log-info">[2026-04-04 05:45:42] INFO   | Metric exported: cpu_usage=76%</text>
  
  <!-- Cursor -->
  <rect x="30" y="370" width="10" height="15" class="cursor blinking"/>
