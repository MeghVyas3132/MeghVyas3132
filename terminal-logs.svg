  <text x="30" y="170" class="log-text log-info">[2025-12-30 23:24:02] INFO   | Pod auth-service-5f2c7 started</text>
  <text x="30" y="190" class="log-text log-info">[2025-12-30 23:24:04] INFO   | Database query optimized (95ms→10ms)</text>
  <text x="30" y="210" class="log-text log-info">[2025-12-30 23:24:06] INFO   | Database query optimized (99ms→17ms)</text>
  <text x="30" y="230" class="log-text log-debug">[2025-12-30 23:24:08] DEBUG  | Rate limit check: 8556 req/s</text>
  <text x="30" y="250" class="log-text log-info">[2025-12-30 23:24:10] INFO   | Deploy rollout: 31/47 pods updated</text>
