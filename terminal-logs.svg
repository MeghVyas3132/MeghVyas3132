  <text x="30" y="150" class="log-text log-info">[2026-07-10 04:13:03] INFO   | Health check passed: user-service</text>
  <text x="30" y="170" class="log-text log-info">[2026-07-10 04:13:05] INFO   | Load balancer: distributing traffic</text>
  <text x="30" y="190" class="log-text log-debug">[2026-07-10 04:13:07] DEBUG  | Cache hit: user:2c7b6</text>
  <text x="30" y="210" class="log-text log-info">[2026-07-10 04:13:09] INFO   | Auto-scaling triggered: +1 pods</text>
  <text x="30" y="230" class="log-text log-info">[2026-07-10 04:13:11] INFO   | Deploy rollout: 40/47 pods updated</text>
  <text x="30" y="250" class="log-text log-info">[2026-07-10 04:13:13] INFO   | Auto-scaling triggered: +3 pods</text>
  <text x="30" y="270" class="log-text log-warn">[2026-07-10 04:13:15] WARN   | High latency detected: api-gateway</text>
  <text x="30" y="290" class="log-text log-info">[2026-07-10 04:13:17] INFO   | Load balancer: distributing traffic</text>
