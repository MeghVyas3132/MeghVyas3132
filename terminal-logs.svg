<svg width="1200" height="400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .terminal-bg { fill: #0a0a0a; }
      .terminal-border { fill: none; stroke: #404040; stroke-width: 2; }
      .terminal-title { font: bold 16px 'Courier New', monospace; fill: #ffffff; }
      .log-text { font: 12px 'Courier New', monospace; }
      .log-info { fill: #fdba74; }
      .log-warn { fill: #fcd34d; }
      .log-debug { fill: #a8a29e; }
      .cursor { fill: #fdba74; }
      @keyframes blink {
        0%, 50% { opacity: 1; }
        51%, 100% { opacity: 0; }
      }
      .blinking { animation: blink 1s infinite; }
    </style>
  </defs>
  
  <rect width="1200" height="400" class="terminal-bg"/>
  <rect x="5" y="5" width="1190" height="390" class="terminal-border" rx="8"/>
  
  <!-- Terminal Header -->
  <rect x="15" y="15" width="1170" height="35" fill="#1a1a1a" rx="5"/>
  <text x="30" y="38" class="terminal-title">LIVE SYSTEM LOGS [LAST 60 SECONDS]</text>
  
  <!-- Log Lines -->
  <text x="30" y="70" class="log-text log-info">[2026-04-10 19:53:50] INFO   | Request processed: 200 OK (42ms)</text>
  <text x="30" y="90" class="log-text log-warn">[2026-04-10 19:53:52] WARN   | High latency detected: api-gateway</text>
  <text x="30" y="110" class="log-text log-info">[2026-04-10 19:53:54] INFO   | Load balancer: distributing traffic</text>
  <text x="30" y="130" class="log-text log-debug">[2026-04-10 19:53:56] DEBUG  | Rate limit check: 8511 req/s</text>
  <text x="30" y="150" class="log-text log-info">[2026-04-10 19:53:58] INFO   | Metric exported: cpu_usage=74%</text>
  <text x="30" y="170" class="log-text log-info">[2026-04-10 19:54:00] INFO   | Pod payment-service-9e7f5 started</text>
  <text x="30" y="190" class="log-text log-info">[2026-04-10 19:54:02] INFO   | Pod notification-svc-7a6f5 started</text>
  <text x="30" y="210" class="log-text log-info">[2026-04-10 19:54:04] INFO   | Request processed: 200 OK (21ms)</text>
  <text x="30" y="230" class="log-text log-info">[2026-04-10 19:54:06] INFO   | Metric exported: cpu_usage=86%</text>
  <text x="30" y="250" class="log-text log-info">[2026-04-10 19:54:08] INFO   | Deploy rollout: 37/47 pods updated</text>
  <text x="30" y="270" class="log-text log-info">[2026-04-10 19:54:10] INFO   | Backup completed: 670 MB</text>
  <text x="30" y="290" class="log-text log-info">[2026-04-10 19:54:12] INFO   | Metric exported: cpu_usage=88%</text>
  <text x="30" y="310" class="log-text log-info">[2026-04-10 19:54:14] INFO   | Health check passed: user-service</text>
  <text x="30" y="330" class="log-text log-info">[2026-04-10 19:54:16] INFO   | Load balancer: distributing traffic</text>
  <text x="30" y="350" class="log-text log-warn">[2026-04-10 19:54:18] WARN   | High latency detected: payment-service</text>
  
  <!-- Cursor -->
  <rect x="30" y="370" width="10" height="15" class="cursor blinking"/>
  <text x="45" y="382" class="log-text log-info">[Streaming...]</text>
</svg>