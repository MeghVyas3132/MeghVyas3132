  <text x="30" y="150" class="log-text log-debug">[2025-12-31 21:37:28] DEBUG  | Circuit breaker: CLOSED</text>
  <text x="30" y="170" class="log-text log-info">[2025-12-31 21:37:30] INFO   | Container started: notification-svc-6d8f5</text>
  <text x="30" y="190" class="log-text log-info">[2025-12-31 21:37:32] INFO   | Metric exported: cpu_usage=76%</text>
  <text x="30" y="210" class="log-text log-info">[2025-12-31 21:37:34] INFO   | SSL cert renewed: *.meghvyas.dev</text>
  <text x="30" y="230" class="log-text log-info">[2025-12-31 21:37:36] INFO   | Load balancer: distributing traffic</text>
  <text x="30" y="250" class="log-text log-info">[2025-12-31 21:37:38] INFO   | Request processed: 200 OK (50ms)</text>
  <text x="30" y="270" class="log-text log-debug">[2025-12-31 21:37:40] DEBUG  | Circuit breaker: CLOSED</text>
  <text x="30" y="290" class="log-text log-info">[2025-12-31 21:37:42] INFO   | Health check passed: notification-svc</text>
  <text x="30" y="310" class="log-text log-info">[2025-12-31 21:37:44] INFO   | Deploy rollout: 21/47 pods updated</text>
  <text x="30" y="330" class="log-text log-info">[2025-12-31 21:37:46] INFO   | Deploy rollout: 34/47 pods updated</text>
  <text x="30" y="350" class="log-text log-warn">[2025-12-31 21:37:48] WARN   | High latency detected: payment-service</text>
  
