<svg width="1200" height="400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .terminal-bg { fill: #0a0a0a; }
      .terminal-border { fill: none; stroke: #404040; stroke-width: 2; }
      .terminal-title { font: bold 16px 'Courier New', monospace; fill: #ffffff; }
      .log-text { font: 12px 'Courier New', monospace; }
      .log-info { fill: #fdba74; }
      .log-warn { fill: #fcd34d; }
      .log-debug { fill: #a8a29e; }
      .cursor { fill: #fdba74; }
      @keyframes blink {
        0%, 50% { opacity: 1; }
        51%, 100% { opacity: 0; }
      }
      .blinking { animation: blink 1s infinite; }
    </style>
  </defs>
  
  <rect width="1200" height="400" class="terminal-bg"/>
  <rect x="5" y="5" width="1190" height="390" class="terminal-border" rx="8"/>
  
  <!-- Terminal Header -->
  <rect x="15" y="15" width="1170" height="35" fill="#1a1a1a" rx="5"/>
  <text x="30" y="38" class="terminal-title">LIVE SYSTEM LOGS [LAST 60 SECONDS]</text>
  
  <!-- Log Lines -->
  <text x="30" y="70" class="log-text log-warn">[2026-04-04 02:54:13] WARN   | High latency detected: payment-service</text>
  <text x="30" y="90" class="log-text log-info">[2026-04-04 02:54:15] INFO   | Container started: api-gateway-7c1f1</text>
  <text x="30" y="110" class="log-text log-info">[2026-04-04 02:54:17] INFO   | Deploy rollout: 23/47 pods updated</text>
  <text x="30" y="130" class="log-text log-warn">[2026-04-04 02:54:19] WARN   | High latency detected: auth-service</text>
  <text x="30" y="150" class="log-text log-debug">[2026-04-04 02:54:21] DEBUG  | Circuit breaker: CLOSED</text>
  <text x="30" y="170" class="log-text log-info">[2026-04-04 02:54:23] INFO   | Backup completed: 882 MB</text>
  <text x="30" y="190" class="log-text log-info">[2026-04-04 02:54:25] INFO   | Container started: api-gateway-6f9c5</text>
  <text x="30" y="210" class="log-text log-debug">[2026-04-04 02:54:27] DEBUG  | Circuit breaker: CLOSED</text>
  <text x="30" y="230" class="log-text log-info">[2026-04-04 02:54:29] INFO   | Backup completed: 703 MB</text>
  <text x="30" y="250" class="log-text log-info">[2026-04-04 02:54:31] INFO   | Container started: user-service-9e1f9</text>
  <text x="30" y="270" class="log-text log-debug">[2026-04-04 02:54:33] DEBUG  | Rate limit check: 9893 req/s</text>
