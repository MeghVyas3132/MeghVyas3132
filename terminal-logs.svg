  <text x="30" y="150" class="log-text log-info">[2026-01-02 16:33:25] INFO   | Health check passed: payment-service</text>
  <text x="30" y="170" class="log-text log-info">[2026-01-02 16:33:27] INFO   | Deploy rollout: 22/47 pods updated</text>
  <text x="30" y="190" class="log-text log-debug">[2026-01-02 16:33:29] DEBUG  | Circuit breaker: CLOSED</text>
  <text x="30" y="210" class="log-text log-debug">[2026-01-02 16:33:31] DEBUG  | Rate limit check: 9656 req/s</text>
  <text x="30" y="230" class="log-text log-info">[2026-01-02 16:33:33] INFO   | Request processed: 200 OK (25ms)</text>
  <text x="30" y="250" class="log-text log-info">[2026-01-02 16:33:35] INFO   | Metric exported: cpu_usage=77%</text>
  <text x="30" y="270" class="log-text log-info">[2026-01-02 16:33:37] INFO   | Health check passed: api-gateway</text>
  <text x="30" y="290" class="log-text log-debug">[2026-01-02 16:33:39] DEBUG  | Circuit breaker: CLOSED</text>
  <text x="30" y="310" class="log-text log-info">[2026-01-02 16:33:41] INFO   | Backup completed: 830 MB</text>
  <text x="30" y="330" class="log-text log-info">[2026-01-02 16:33:43] INFO   | Deploy rollout: 33/47 pods updated</text>
  <text x="30" y="350" class="log-text log-info">[2026-01-02 16:33:45] INFO   | Backup completed: 778 MB</text>
  
  <!-- Cursor -->
  <rect x="30" y="370" width="10" height="15" class="cursor blinking"/>
  <text x="45" y="382" class="log-text log-info">[Streaming...]</text>
</svg>