  <text x="30" y="130" class="log-text log-info">[2026-01-05 20:25:16] INFO   | Backup completed: 622 MB</text>
  <text x="30" y="150" class="log-text log-info">[2026-01-05 20:25:18] INFO   | Pod auth-service-6e5e5 started</text>
  <text x="30" y="170" class="log-text log-info">[2026-01-05 20:25:20] INFO   | Load balancer: distributing traffic</text>
  <text x="30" y="190" class="log-text log-debug">[2026-01-05 20:25:22] DEBUG  | Rate limit check: 7389 req/s</text>
  <text x="30" y="210" class="log-text log-info">[2026-01-05 20:25:24] INFO   | Backup completed: 721 MB</text>
  <text x="30" y="230" class="log-text log-info">[2026-01-05 20:25:26] INFO   | Health check passed: payment-service</text>
  <text x="30" y="250" class="log-text log-info">[2026-01-05 20:25:28] INFO   | Auto-scaling triggered: +2 pods</text>
