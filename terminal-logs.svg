<svg width="1200" height="400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .terminal-bg { fill: #0a0a0a; }
      .terminal-border { fill: none; stroke: #404040; stroke-width: 2; }
      .terminal-title { font: bold 16px 'Courier New', monospace; fill: #ffffff; }
      .log-text { font: 12px 'Courier New', monospace; }
      .log-info { fill: #fdba74; }
      .log-warn { fill: #fcd34d; }
      .log-debug { fill: #a8a29e; }
      .cursor { fill: #fdba74; }
      @keyframes blink {
        0%, 50% { opacity: 1; }
        51%, 100% { opacity: 0; }
      }
      .blinking { animation: blink 1s infinite; }
    </style>
  </defs>
  
  <rect width="1200" height="400" class="terminal-bg"/>
  <rect x="5" y="5" width="1190" height="390" class="terminal-border" rx="8"/>
  
  <!-- Terminal Header -->
  <rect x="15" y="15" width="1170" height="35" fill="#1a1a1a" rx="5"/>
  <text x="30" y="38" class="terminal-title">LIVE SYSTEM LOGS [LAST 60 SECONDS]</text>
  
  <!-- Log Lines -->
  <text x="30" y="70" class="log-text log-info">[2026-03-07 16:37:57] INFO   | Request processed: 200 OK (35ms)</text>
  <text x="30" y="90" class="log-text log-info">[2026-03-07 16:37:59] INFO   | Container started: user-service-5e8f3</text>
  <text x="30" y="110" class="log-text log-info">[2026-03-07 16:38:01] INFO   | Pod payment-service-1c1e2 started</text>
  <text x="30" y="130" class="log-text log-debug">[2026-03-07 16:38:03] DEBUG  | Rate limit check: 7090 req/s</text>
  <text x="30" y="150" class="log-text log-info">[2026-03-07 16:38:05] INFO   | Health check passed: user-service</text>
  <text x="30" y="170" class="log-text log-info">[2026-03-07 16:38:07] INFO   | Database query optimized (42ms→10ms)</text>
  <text x="30" y="190" class="log-text log-info">[2026-03-07 16:38:09] INFO   | Request processed: 200 OK (41ms)</text>
  <text x="30" y="210" class="log-text log-info">[2026-03-07 16:38:11] INFO   | Load balancer: distributing traffic</text>
  <text x="30" y="230" class="log-text log-info">[2026-03-07 16:38:13] INFO   | Metric exported: cpu_usage=72%</text>
  <text x="30" y="250" class="log-text log-debug">[2026-03-07 16:38:15] DEBUG  | Cache hit: user:3e5b2</text>
  <text x="30" y="270" class="log-text log-info">[2026-03-07 16:38:17] INFO   | Request processed: 200 OK (24ms)</text>
  <text x="30" y="290" class="log-text log-warn">[2026-03-07 16:38:19] WARN   | High latency detected: api-gateway</text>
  <text x="30" y="310" class="log-text log-debug">[2026-03-07 16:38:21] DEBUG  | Cache hit: user:8a5a1</text>
  <text x="30" y="330" class="log-text log-info">[2026-03-07 16:38:23] INFO   | Metric exported: cpu_usage=92%</text>
