  <text x="30" y="170" class="log-text log-info">[2026-05-26 23:20:32] INFO   | Load balancer: distributing traffic</text>
  <text x="30" y="190" class="log-text log-info">[2026-05-26 23:20:34] INFO   | Auto-scaling triggered: +1 pods</text>
  <text x="30" y="210" class="log-text log-info">[2026-05-26 23:20:36] INFO   | Deploy rollout: 33/47 pods updated</text>
