  <text x="30" y="170" class="log-text log-warn">[2026-04-27 15:10:50] WARN   | High latency detected: auth-service</text>
  <text x="30" y="190" class="log-text log-info">[2026-04-27 15:10:52] INFO   | Pod user-service-5b8b8 started</text>
