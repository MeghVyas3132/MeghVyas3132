<svg width="1200" height="400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .terminal-bg { fill: #0a0a0a; }
      .terminal-border { fill: none; stroke: #404040; stroke-width: 2; }
      .terminal-title { font: bold 16px 'Courier New', monospace; fill: #ffffff; }
      .log-text { font: 12px 'Courier New', monospace; }
      .log-info { fill: #fdba74; }
      .log-warn { fill: #fcd34d; }
      .log-debug { fill: #a8a29e; }
      .cursor { fill: #fdba74; }
      @keyframes blink {
        0%, 50% { opacity: 1; }
        51%, 100% { opacity: 0; }
      }
      .blinking { animation: blink 1s infinite; }
    </style>
  </defs>
  
  <rect width="1200" height="400" class="terminal-bg"/>
  <rect x="5" y="5" width="1190" height="390" class="terminal-border" rx="8"/>
  
  <!-- Terminal Header -->
  <rect x="15" y="15" width="1170" height="35" fill="#1a1a1a" rx="5"/>
  <text x="30" y="38" class="terminal-title">LIVE SYSTEM LOGS [LAST 60 SECONDS]</text>
  
  <!-- Log Lines -->
  <text x="30" y="70" class="log-text log-info">[2026-03-07 20:21:43] INFO   | Request processed: 200 OK (34ms)</text>
  <text x="30" y="90" class="log-text log-info">[2026-03-07 20:21:45] INFO   | Container started: user-service-9f6e6</text>
  <text x="30" y="110" class="log-text log-info">[2026-03-07 20:21:47] INFO   | Metric exported: cpu_usage=86%</text>
  <text x="30" y="130" class="log-text log-info">[2026-03-07 20:21:49] INFO   | Database query optimized (45ms→18ms)</text>
  <text x="30" y="150" class="log-text log-info">[2026-03-07 20:21:51] INFO   | Deploy rollout: 20/47 pods updated</text>
  <text x="30" y="170" class="log-text log-warn">[2026-03-07 20:21:53] WARN   | High latency detected: auth-service</text>
  <text x="30" y="190" class="log-text log-debug">[2026-03-07 20:21:55] DEBUG  | Cache hit: user:5f5a5</text>
  <text x="30" y="210" class="log-text log-info">[2026-03-07 20:21:57] INFO   | Load balancer: distributing traffic</text>
  <text x="30" y="230" class="log-text log-info">[2026-03-07 20:21:59] INFO   | Metric exported: cpu_usage=73%</text>
  <text x="30" y="250" class="log-text log-info">[2026-03-07 20:22:01] INFO   | Metric exported: cpu_usage=71%</text>
  <text x="30" y="270" class="log-text log-info">[2026-03-07 20:22:03] INFO   | Health check passed: api-gateway</text>
  <text x="30" y="290" class="log-text log-info">[2026-03-07 20:22:05] INFO   | Auto-scaling triggered: +2 pods</text>
  <text x="30" y="310" class="log-text log-info">[2026-03-07 20:22:07] INFO   | Pod auth-service-2b2c9 started</text>
  <text x="30" y="330" class="log-text log-info">[2026-03-07 20:22:09] INFO   | Deploy rollout: 22/47 pods updated</text>
  <text x="30" y="350" class="log-text log-info">[2026-03-07 20:22:11] INFO   | Pod payment-service-5f8c2 started</text>
  
  <!-- Cursor -->
  <rect x="30" y="370" width="10" height="15" class="cursor blinking"/>
  <text x="45" y="382" class="log-text log-info">[Streaming...]</text>
</svg>