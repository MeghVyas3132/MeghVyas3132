  <text x="30" y="150" class="log-text log-debug">[2026-05-05 11:41:02] DEBUG  | Cache hit: user:8d5d1</text>
  <text x="30" y="170" class="log-text log-info">[2026-05-05 11:41:04] INFO   | Container started: payment-service-5e3f5</text>
  <text x="30" y="190" class="log-text log-info">[2026-05-05 11:41:06] INFO   | SSL cert renewed: *.meghvyas.dev</text>
  <text x="30" y="210" class="log-text log-info">[2026-05-05 11:41:08] INFO   | Metric exported: cpu_usage=76%</text>
  <text x="30" y="230" class="log-text log-info">[2026-05-05 11:41:10] INFO   | Metric exported: cpu_usage=77%</text>
  <text x="30" y="250" class="log-text log-info">[2026-05-05 11:41:12] INFO   | Pod payment-service-4d7b6 started</text>
  <text x="30" y="270" class="log-text log-info">[2026-05-05 11:41:14] INFO   | Load balancer: distributing traffic</text>
  <text x="30" y="290" class="log-text log-warn">[2026-05-05 11:41:16] WARN   | High latency detected: auth-service</text>
