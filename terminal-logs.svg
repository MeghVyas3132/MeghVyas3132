  <text x="30" y="150" class="log-text log-debug">[2026-05-04 22:15:40] DEBUG  | Cache hit: user:7a8c8</text>
  <text x="30" y="170" class="log-text log-info">[2026-05-04 22:15:42] INFO   | Container started: user-service-9b6b9</text>
  <text x="30" y="190" class="log-text log-info">[2026-05-04 22:15:44] INFO   | Deploy rollout: 35/47 pods updated</text>
