  <text x="30" y="130" class="log-text log-debug">[2026-01-04 11:09:23] DEBUG  | Rate limit check: 9179 req/s</text>
  <text x="30" y="150" class="log-text log-info">[2026-01-04 11:09:25] INFO   | Container started: notification-svc-2b3c6</text>
  <text x="30" y="170" class="log-text log-info">[2026-01-04 11:09:27] INFO   | Metric exported: cpu_usage=93%</text>
  <text x="30" y="190" class="log-text log-debug">[2026-01-04 11:09:29] DEBUG  | Circuit breaker: CLOSED</text>
  <text x="30" y="210" class="log-text log-debug">[2026-01-04 11:09:31] DEBUG  | Circuit breaker: CLOSED</text>
  <text x="30" y="230" class="log-text log-debug">[2026-01-04 11:09:33] DEBUG  | Rate limit check: 5819 req/s</text>
  <text x="30" y="250" class="log-text log-warn">[2026-01-04 11:09:35] WARN   | High latency detected: user-service</text>
  <text x="30" y="270" class="log-text log-info">[2026-01-04 11:09:37] INFO   | Deploy rollout: 28/47 pods updated</text>
  <text x="30" y="290" class="log-text log-debug">[2026-01-04 11:09:39] DEBUG  | Cache hit: user:3b7f5</text>
  <text x="30" y="310" class="log-text log-info">[2026-01-04 11:09:41] INFO   | Request processed: 200 OK (31ms)</text>
