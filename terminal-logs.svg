  <text x="30" y="150" class="log-text log-info">[2026-01-08 03:19:43] INFO   | Auto-scaling triggered: +3 pods</text>
  <text x="30" y="170" class="log-text log-info">[2026-01-08 03:19:45] INFO   | Load balancer: distributing traffic</text>
  <text x="30" y="190" class="log-text log-info">[2026-01-08 03:19:47] INFO   | Metric exported: cpu_usage=92%</text>
