  <text x="30" y="330" class="log-text log-info">[2026-04-17 20:59:51] INFO   | Database query optimized (42ms→10ms)</text>
  <text x="30" y="350" class="log-text log-info">[2026-04-17 20:59:53] INFO   | Metric exported: cpu_usage=79%</text>
  
  <!-- Cursor -->
  <rect x="30" y="370" width="10" height="15" class="cursor blinking"/>
