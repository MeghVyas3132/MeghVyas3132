  <text x="30" y="170" class="log-text log-debug">[2026-03-24 20:22:09] DEBUG  | Rate limit check: 6740 req/s</text>
  <text x="30" y="190" class="log-text log-debug">[2026-03-24 20:22:11] DEBUG  | Circuit breaker: CLOSED</text>
  <text x="30" y="210" class="log-text log-info">[2026-03-24 20:22:13] INFO   | Pod user-service-1c5f2 started</text>
