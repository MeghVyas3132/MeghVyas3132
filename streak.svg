<svg width="600" height="210" viewBox="0 0 600 210" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="fl" cx="92%" cy="8%" r="70%">
      <stop offset="0%" stop-color="#e8451c" stop-opacity="0.16"/>
      <stop offset="60%" stop-color="#e8451c" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="in" cx="4%" cy="96%" r="72%">
      <stop offset="0%" stop-color="#16305e" stop-opacity="0.12"/>
      <stop offset="64%" stop-color="#16305e" stop-opacity="0"/>
    </radialGradient>
    <filter id="gr"><feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="2" stitchTiles="stitch" result="n"/><feColorMatrix in="n" type="saturate" values="0"/></filter>
    <style>
      text{font-family:'SFMono-Regular','SF Mono',Menlo,Consolas,'Liberation Mono',monospace}
      .val{fill:#0d2148;font-size:28px;font-weight:600}
      .big{fill:#e8451c;font-size:38px;font-weight:600}
      .ttl{fill:#45568a;font-size:11.5px;letter-spacing:1.4px}
      .lab{fill:#8794b4;font-size:10px}
    </style>
  </defs>
  <rect x="0" y="0" width="600" height="210" rx="18" fill="#f7e7c8"/>
  <rect x="0" y="0" width="600" height="210" rx="18" fill="url(#fl)"/>
  <rect x="0" y="0" width="600" height="210" rx="18" fill="url(#in)"/>
  <rect x="0" y="0" width="600" height="210" rx="18" filter="url(#gr)" opacity="0.22" style="mix-blend-mode:multiply"/>
  <rect x="0.75" y="0.75" width="598.5" height="208.5" rx="17.5" fill="none" stroke="#16305e" stroke-opacity="0.14" stroke-width="1.5"/>

  <line x1="200" y1="40" x2="200" y2="170" stroke="#16305e" stroke-opacity="0.12" stroke-width="1.5"/>
  <line x1="400" y1="40" x2="400" y2="170" stroke="#16305e" stroke-opacity="0.12" stroke-width="1.5"/>

  <g transform="translate(100,104)">
    <text class="val" text-anchor="middle" y="0">0</text>
    <text class="ttl" text-anchor="middle" y="30">TOTAL CONTRIBUTIONS</text>
    <text class="lab" text-anchor="middle" y="48">N/A — Present</text>
  </g>

  <g transform="translate(300,100)">
    <circle cx="0" cy="-8" r="34" fill="none" stroke="#e6c78f" stroke-width="5"/>
    <circle cx="0" cy="-8" r="34" fill="none" stroke="#e8451c" stroke-width="5" stroke-linecap="round"
            stroke-dasharray="213.63" stroke-dashoffset="213.63" transform="rotate(-90 0 -8)"/>
    <text class="big" text-anchor="middle" y="4">0</text>
    <text class="ttl" text-anchor="middle" y="46" fill="#16305e">CURRENT STREAK</text>
    <text class="lab" text-anchor="middle" y="63">N/A</text>
  </g>

  <g transform="translate(500,104)">
    <text class="val" text-anchor="middle" y="0">0</text>
    <text class="ttl" text-anchor="middle" y="30">LONGEST STREAK</text>
    <text class="lab" text-anchor="middle" y="48">N/A</text>
  </g>
</svg>