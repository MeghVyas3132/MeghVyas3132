name: Update Profile Dashboards

on:
  schedule:
    - cron: "0 */2 * * *"  # Every 2 hours to avoid API rate limits
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  update-dashboards:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3
        
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'
          
      - name: Install Dependencies
        run: pip install requests
        
      - name: Generate Stats SVG
        run: python generate_stats.py
        
      - name: Generate Mission Control Dashboard
        run: python generate_mission_control.py
        
      - name: Generate CI/CD Pipeline
        run: python generate_cicd_pipeline.py
        
      - name: Generate Terminal Logs
        run: python generate_terminal_logs.py
        
      - name: Commit and Push Changes
        run: |
          git config --local user.email "megh.vyas@yahoo.com"
          git config --local user.name "Megh Vyas"
          git add *.svg
          git diff --quiet && git diff --staged --quiet || (git commit -m "Update dashboards [$(date +'%Y-%m-%d %H:%M:%S')]" && git push)
