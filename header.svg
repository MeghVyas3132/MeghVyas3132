<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 200" width="1200" height="200">
  <defs>
    <!-- Cinematic Night Sky -->
    <linearGradient id="sky" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#02000a"/>
      <stop offset="20%" stop-color="#0a0312"/>
      <stop offset="40%" stop-color="#18081c"/>
      <stop offset="60%" stop-color="#2e0f24"/>
      <stop offset="80%" stop-color="#4a1830"/>
      <stop offset="95%" stop-color="#6a2040"/>
      <stop offset="100%" stop-color="#85284a"/>
    </linearGradient>
    
    <!-- Horizon Ambient Glow -->
    <radialGradient id="ambientGlow" cx="50%" cy="120%" r="80%">
      <stop offset="0%" stop-color="#ff6080" stop-opacity="0.25"/>
      <stop offset="50%" stop-color="#a03050" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#500020" stop-opacity="0"/>
    </radialGradient>
    
    <!-- Building Gradients with realistic depth -->
    <linearGradient id="bldgFar" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#12101a"/>
      <stop offset="100%" stop-color="#08060c"/>
    </linearGradient>
    <linearGradient id="bldgMid" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1c1828"/>
      <stop offset="100%" stop-color="#0e0c14"/>
    </linearGradient>
    <linearGradient id="bldgNear" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#262035"/>
      <stop offset="100%" stop-color="#14101c"/>
    </linearGradient>
    
    <!-- Glass/Window reflection -->
    <linearGradient id="glassShine" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.06"/>
      <stop offset="50%" stop-color="#ffffff" stop-opacity="0.01"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.04"/>
    </linearGradient>
    
    <!-- Glow filters -->
    <filter id="starGlow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="beaconGlow" x="-200%" y="-200%" width="500%" height="500%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="5"/>
    </filter>
    <filter id="lightGlow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2"/>
    </filter>
    <filter id="windowGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="1"/>
    </filter>
    
    <!-- Clip path for rounded corners -->
    <clipPath id="roundClip">
      <rect x="0" y="0" width="1200" height="200" rx="14" ry="14"/>
    </clipPath>
    
    <style>
      @keyframes fly {
        0% { transform: translate(-130px, 0); }
        20% { transform: translate(150px, -3px); }
        40% { transform: translate(450px, 2px); }
        60% { transform: translate(750px, -2px); }
        80% { transform: translate(1050px, 3px); }
        100% { transform: translate(1350px, 0); }
      }
      @keyframes twinkle {
        0%, 100% { opacity: 0.25; }
        50% { opacity: 1; }
      }
      @keyframes beacon {
        0%, 42%, 100% { opacity: 0.12; }
        45%, 55% { opacity: 1; }
      }
      @keyframes strobe {
        0%, 88%, 100% { opacity: 0; }
        90%, 95% { opacity: 1; }
      }
      @keyframes navPulse {
        0%, 100% { opacity: 0.5; }
        50% { opacity: 1; }
      }
      .aircraft { animation: fly 42s linear infinite; }
      .star { animation: twinkle 4s ease-in-out infinite; }
      .beacon { animation: beacon 2.8s ease-in-out infinite; }
      .strobe { animation: strobe 1s linear infinite; }
      .nav { animation: navPulse 1.5s ease-in-out infinite; }
    </style>
  </defs>
  
  <!-- All content clipped to rounded rectangle -->
  <g clip-path="url(#roundClip)">
    
    <!-- Sky background -->
    <rect width="1200" height="200" fill="url(#sky)"/>
    
    <!-- Ambient city glow -->
    <rect width="1200" height="200" fill="url(#ambientGlow)"/>
    
    <!-- Stars scattered across sky -->
    <g fill="#ffffff">
      <circle cx="65" cy="18" r="1.2" class="star" filter="url(#starGlow)" style="animation-delay:0s"/>
      <circle cx="140" cy="42" r="0.8" class="star" filter="url(#starGlow)" style="animation-delay:0.6s"/>
      <circle cx="235" cy="15" r="1.0" class="star" filter="url(#starGlow)" style="animation-delay:1.3s"/>
      <circle cx="320" cy="55" r="0.6" class="star" filter="url(#starGlow)" style="animation-delay:0.3s"/>
      <circle cx="415" cy="28" r="1.1" class="star" filter="url(#starGlow)" style="animation-delay:2.0s"/>
      <circle cx="510" cy="48" r="0.7" class="star" filter="url(#starGlow)" style="animation-delay:0.9s"/>
      <circle cx="590" cy="12" r="1.3" class="star" filter="url(#starGlow)" style="animation-delay:1.6s"/>
      <circle cx="685" cy="38" r="0.9" class="star" filter="url(#starGlow)" style="animation-delay:0.4s"/>
      <circle cx="770" cy="22" r="1.0" class="star" filter="url(#starGlow)" style="animation-delay:2.3s"/>
      <circle cx="865" cy="52" r="0.65" class="star" filter="url(#starGlow)" style="animation-delay:1.1s"/>
      <circle cx="955" cy="18" r="1.15" class="star" filter="url(#starGlow)" style="animation-delay:0.7s"/>
      <circle cx="1045" cy="45" r="0.75" class="star" filter="url(#starGlow)" style="animation-delay:1.9s"/>
      <circle cx="1130" cy="30" r="0.95" class="star" filter="url(#starGlow)" style="animation-delay:0.2s"/>
      <circle cx="105" cy="62" r="0.5" class="star" filter="url(#starGlow)" style="animation-delay:1.5s"/>
      <circle cx="480" cy="65" r="0.55" class="star" filter="url(#starGlow)" style="animation-delay:2.5s"/>
      <circle cx="820" cy="60" r="0.5" class="star" filter="url(#starGlow)" style="animation-delay:0.8s"/>
      <circle cx="1085" cy="58" r="0.6" class="star" filter="url(#starGlow)" style="animation-delay:1.2s"/>
    </g>
    
    <!-- === FAR BUILDINGS (most faded) === -->
    <g fill="url(#bldgFar)" opacity="0.45">
      <rect x="0" y="152" width="32" height="48"/>
      <rect x="36" y="145" width="28" height="55"/>
      <rect x="68" y="155" width="25" height="45"/>
      <rect x="97" y="148" width="30" height="52"/>
      <rect x="780" y="150" width="28" height="50"/>
      <rect x="812" y="145" width="32" height="55"/>
      <rect x="848" y="152" width="26" height="48"/>
      <rect x="878" y="148" width="30" height="52"/>
      <rect x="912" y="155" width="28" height="45"/>
      <rect x="944" y="150" width="32" height="50"/>
      <rect x="980" y="145" width="26" height="55"/>
      <rect x="1010" y="152" width="30" height="48"/>
      <rect x="1044" y="148" width="28" height="52"/>
      <rect x="1076" y="155" width="32" height="45"/>
      <rect x="1112" y="150" width="26" height="50"/>
      <rect x="1142" y="145" width="30" height="55"/>
      <rect x="1176" y="155" width="24" height="45"/>
    </g>
    
    <!-- === MID LAYER BUILDINGS === -->
    <g fill="url(#bldgMid)" opacity="0.72">
      <!-- Left side -->
      <rect x="8" y="132" width="45" height="68"/>
      <rect x="58" y="120" width="40" height="80"/>
      <rect x="103" y="128" width="35" height="72"/>
      
      <!-- Empire State Building -->
      <rect x="148" y="90" width="54" height="110"/>
      <rect x="160" y="72" width="30" height="18"/>
      <rect x="168" y="54" width="14" height="18"/>
      <polygon points="175,54 169,54 175,30 181,54"/>
      
      <rect x="210" y="124" width="42" height="76"/>
      <rect x="258" y="114" width="38" height="86"/>
      
      <!-- One World Trade Center -->
      <rect x="302" y="62" width="52" height="138"/>
      <polygon points="328,62 307,62 328,38 349,62"/>
      
      <rect x="360" y="118" width="40" height="82"/>
      <rect x="406" y="126" width="44" height="74"/>
      
      <!-- Chrysler Building style -->
      <rect x="458" y="82" width="50" height="118"/>
      <polygon points="483,82 463,82 471,64 495,64 503,82"/>
      <polygon points="483,64 474,64 483,48 492,64"/>
      
      <rect x="515" y="122" width="38" height="78"/>
      <rect x="558" y="130" width="42" height="70"/>
      
      <!-- Central buildings -->
      <rect x="606" y="108" width="48" height="92"/>
      <rect x="660" y="120" width="40" height="80"/>
      <rect x="706" y="102" width="52" height="98"/>
      <rect x="764" y="115" width="38" height="85"/>
    </g>
    
    <!-- Glass shine on mid buildings -->
    <g fill="url(#glassShine)">
      <rect x="148" y="90" width="54" height="110"/>
      <rect x="302" y="62" width="52" height="138"/>
      <rect x="458" y="82" width="50" height="118"/>
      <rect x="606" y="108" width="48" height="92"/>
      <rect x="706" y="102" width="52" height="98"/>
    </g>
    
    <!-- === NEAR BUILDINGS (foreground) === -->
    <g fill="url(#bldgNear)">
      <rect x="0" y="142" width="52" height="58"/>
      <rect x="58" y="130" width="55" height="70"/>
      <rect x="1055" y="135" width="52" height="65"/>
      <rect x="1112" y="128" width="48" height="72"/>
      <rect x="1165" y="140" width="35" height="60"/>
    </g>
    
    <!-- Glass on near buildings -->
    <g fill="url(#glassShine)">
      <rect x="0" y="142" width="52" height="58"/>
      <rect x="58" y="130" width="55" height="70"/>
      <rect x="1055" y="135" width="52" height="65"/>
      <rect x="1112" y="128" width="48" height="72"/>
    </g>
    
    <!-- === BEACON LIGHTS ON TOWERS === -->
    <g>
      <circle cx="175" cy="34" r="5" fill="#ff2535" opacity="0.6" class="beacon" filter="url(#beaconGlow)"/>
      <circle cx="175" cy="34" r="2.5" fill="#ff4050" class="beacon"/>
      
      <circle cx="328" cy="42" r="4.5" fill="#ff2535" opacity="0.6" class="beacon" style="animation-delay:1.4s" filter="url(#beaconGlow)"/>
      <circle cx="328" cy="42" r="2.2" fill="#ff4050" class="beacon" style="animation-delay:1.4s"/>
      
      <circle cx="483" cy="52" r="4" fill="#ff2535" opacity="0.6" class="beacon" style="animation-delay:0.7s" filter="url(#beaconGlow)"/>
      <circle cx="483" cy="52" r="2" fill="#ff4050" class="beacon" style="animation-delay:0.7s"/>
      
      <circle cx="732" cy="106" r="3" fill="#ff2535" opacity="0.5" class="beacon" style="animation-delay:2.1s" filter="url(#beaconGlow)"/>
      <circle cx="732" cy="106" r="1.5" fill="#ff4050" class="beacon" style="animation-delay:2.1s"/>
    </g>
    
    <!-- === WINDOW LIGHTS === -->
    <g fill="#ffe8aa" filter="url(#windowGlow)">
      <!-- Empire State -->
      <rect x="156" y="98" width="3" height="5" opacity="0.9"/>
      <rect x="168" y="105" width="3" height="5" opacity="0.7"/>
      <rect x="180" y="100" width="3" height="5" opacity="0.8"/>
      <rect x="158" y="128" width="3" height="5" opacity="0.65"/>
      <rect x="173" y="135" width="3" height="5" opacity="0.85"/>
      <rect x="188" y="130" width="3" height="5" opacity="0.6"/>
      <rect x="162" y="158" width="3" height="5" opacity="0.75"/>
      <rect x="178" y="165" width="3" height="5" opacity="0.55"/>
      
      <!-- One WTC -->
      <rect x="312" y="72" width="3" height="5" opacity="0.85"/>
      <rect x="328" y="80" width="3" height="5" opacity="0.7"/>
      <rect x="342" y="75" width="3" height="5" opacity="0.9"/>
      <rect x="316" y="105" width="3" height="5" opacity="0.6"/>
      <rect x="332" y="115" width="3" height="5" opacity="0.8"/>
      <rect x="345" y="108" width="3" height="5" opacity="0.65"/>
      <rect x="310" y="145" width="3" height="5" opacity="0.75"/>
      <rect x="330" y="155" width="3" height="5" opacity="0.5"/>
      
      <!-- Chrysler -->
      <rect x="468" y="90" width="3" height="5" opacity="0.8"/>
      <rect x="483" y="98" width="3" height="5" opacity="0.7"/>
      <rect x="496" y="92" width="3" height="5" opacity="0.85"/>
      <rect x="472" y="125" width="3" height="5" opacity="0.6"/>
      <rect x="488" y="135" width="3" height="5" opacity="0.75"/>
      
      <!-- Other buildings -->
      <rect x="68" y="140" width="3" height="5" opacity="0.7"/>
      <rect x="85" y="148" width="3" height="5" opacity="0.55"/>
      <rect x="100" y="142" width="3" height="5" opacity="0.8"/>
      
      <rect x="615" y="118" width="3" height="5" opacity="0.65"/>
      <rect x="632" y="128" width="3" height="5" opacity="0.8"/>
      <rect x="645" y="122" width="3" height="5" opacity="0.55"/>
      
      <rect x="718" y="112" width="3" height="5" opacity="0.75"/>
      <rect x="735" y="122" width="3" height="5" opacity="0.6"/>
      <rect x="748" y="115" width="3" height="5" opacity="0.85"/>
      
      <rect x="1065" y="145" width="3" height="5" opacity="0.7"/>
      <rect x="1082" y="155" width="3" height="5" opacity="0.55"/>
      <rect x="1095" y="148" width="3" height="5" opacity="0.8"/>
      
      <rect x="1122" y="138" width="3" height="5" opacity="0.65"/>
      <rect x="1138" y="148" width="3" height="5" opacity="0.75"/>
      <rect x="1152" y="142" width="3" height="5" opacity="0.6"/>
    </g>
    
    <!-- === AIRCRAFT === -->
    <g class="aircraft">
      <!-- Shadow/ambient -->
      <ellipse cx="35" cy="68" rx="20" ry="3" fill="#000" opacity="0.2" filter="url(#lightGlow)"/>
      
      <!-- Fuselage -->
      <ellipse cx="35" cy="62" rx="26" ry="5.5" fill="#dcdcdc"/>
      <ellipse cx="35" cy="61" rx="24" ry="4" fill="#e8e8e8"/>
      
      <!-- Nose cone -->
      <ellipse cx="62" cy="62" rx="8" ry="4" fill="#c8c8c8"/>
      
      <!-- Cockpit windows -->
      <ellipse cx="58" cy="60.5" rx="5" ry="2.2" fill="#0a1828" opacity="0.9"/>
      <ellipse cx="58" cy="60.5" rx="4" ry="1.8" fill="#1a2838" opacity="0.5"/>
      
      <!-- Wings -->
      <path d="M26,62 L44,62 L50,50 L20,50 Z" fill="#c0c0c0"/>
      <path d="M28,62 L42,62 L47,52 L23,52 Z" fill="#d0d0d0"/>
      <path d="M26,62 L44,62 L50,74 L20,74 Z" fill="#b8b8b8"/>
      <path d="M28,62 L42,62 L47,72 L23,72 Z" fill="#c8c8c8"/>
      
      <!-- Tail fin -->
      <path d="M8,62 L14,62 L16,52 L6,52 Z" fill="#c8c8c8"/>
      <path d="M9,58 L13,58 L11,46 Z" fill="#d0d0d0"/>
      
      <!-- Engines -->
      <ellipse cx="28" cy="70" rx="4" ry="2" fill="#888"/>
      <ellipse cx="42" cy="70" rx="4" ry="2" fill="#888"/>
      <ellipse cx="4" cy="62" rx="5" ry="3" fill="#ff5500" opacity="0.3" filter="url(#lightGlow)"/>
      
      <!-- Navigation lights -->
      <circle cx="20" cy="50" r="2.5" fill="#ff0020" class="nav" filter="url(#lightGlow)"/>
      <circle cx="50" cy="50" r="2.5" fill="#00ff40" class="nav" style="animation-delay:0.5s" filter="url(#lightGlow)"/>
      
      <!-- Strobe -->
      <circle cx="11" cy="46" r="2" fill="#ffffff" class="strobe" filter="url(#starGlow)"/>
      
      <!-- Anti-collision beacon -->
      <circle cx="35" cy="56" r="1.8" fill="#ff2020" class="beacon" filter="url(#lightGlow)"/>
    </g>
    
  </g>
  
  <!-- Subtle border -->
  <rect x="0.5" y="0.5" width="1199" height="199" rx="14" ry="14" fill="none" stroke="#4a1830" stroke-width="1" opacity="0.5"/>
</svg>